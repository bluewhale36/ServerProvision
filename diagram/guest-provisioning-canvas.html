<!DOCTYPE html>
<!--
 ============================================================================
  diagram/guest-provisioning-canvas.html  (v2)
  Guest ↔ Provisioning Server 통신 캔버스 — Provisioning Step 기준 (living document)
 ============================================================================
  · 구조 : 세로 레인 3개(Provisioning Server / Guest 호스트 / Guest BMC) 사이를
    "Provisioning Step 밴드" 가 위→아래 시간 순서로 가로지른다.
    메시지마다 자기 행(row)을 가져 라벨이 겹치지 않는다.
  · 조작 : 배경 드래그 = 이동 · 휠 = 줌 · 단계 칩 = 해당 밴드로 이동+강조 ·
    라벨/화살표 클릭 = 우측 사이드바에 상세(형식 · 내부 구조 · 예시 전문)
  · 갱신 규약 (슬라이스 종료 시): FLOWS 에 행 추가/status 변경 + CHANGELOG 1줄.
    렌더러(레이아웃 계산)는 손대지 않는다 — 데이터만 자란다.
 ============================================================================
-->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guest ↔ Provisioning Server 통신 캔버스 (Step 기준)</title>
<style>
  :root {
    --bg:#f2f5f8; --card:#fff; --text:#1f2328; --muted:#57606a;
    --border:#d0d7de; --border-soft:#eaecef;
    --lan:#0075de; --mgmt:#6f4cdd; --local:#8b949e;
    --done:#1aae39; --wip:#0075de; --planned:#8b949e;
    --yellow:#C29343; --yellow-bg:#FAF3DD;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans CJK KR",sans-serif;
    margin:0; background:var(--bg); color:var(--text); font-size:14px; overflow:hidden; }

  header { background:#fff; border-bottom:1px solid var(--border); padding:10px 18px; position:relative; z-index:30; }
  header h1 { margin:0; font-size:16px; font-weight:700; display:inline-block; }
  header .sub { font-size:11.5px; color:var(--muted); margin-left:10px; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-items:center; font-size:12px; }
  .chip { border:1px solid var(--border); background:var(--card); border-radius:14px; padding:3px 12px;
    cursor:pointer; font-size:12px; font-weight:600; user-select:none; }
  .chip:hover { border-color:var(--lan); }
  .chip.active { background:#1f2328; color:#fff; border-color:#1f2328; }
  .toolbar .grp { display:flex; gap:8px; align-items:center; padding:3px 10px; background:var(--bg);
    border:1px solid var(--border-soft); border-radius:8px; }
  .toolbar label { display:inline-flex; align-items:center; gap:4px; cursor:pointer; }
  .toolbar button.act { border:1px solid var(--border); background:var(--card); padding:3px 10px; font-size:11px; border-radius:4px; cursor:pointer; }
  .lg { display:inline-block; width:20px; height:0; border-top:3px solid; border-radius:2px; }
  .lg.lan{border-color:var(--lan);} .lg.mgmt{border-color:var(--mgmt);} .lg.local{border-color:var(--local);}
  .b { display:inline-block; font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:8px; }
  .b.done{background:rgba(26,174,57,.12);color:var(--done);} .b.wip{background:rgba(0,117,222,.12);color:var(--wip);}
  .b.planned{background:rgba(0,0,0,.06);color:var(--planned);}

  #viewport { position:absolute; inset:96px 0 0 0; overflow:hidden; cursor:grab; }
  #viewport.panning { cursor:grabbing; }
  #world { position:absolute; left:0; top:0; transform-origin:0 0; }
  #edgelayer { position:absolute; left:0; top:0; pointer-events:none; }
  #edgelayer line.flow { stroke-width:2.5; pointer-events:stroke; cursor:pointer; }
  #edgelayer line.flow.c-lan { stroke:var(--lan); } #edgelayer line.flow.c-mgmt { stroke:var(--mgmt); }
  #edgelayer line.flow.c-local { stroke:var(--local); }
  #edgelayer line.flow.s-planned { stroke-dasharray:7 5; }
  #edgelayer line.flow.dim { opacity:.10; }
  #edgelayer line.flow.selected { stroke-width:5; }
  #edgelayer .lane-rect { rx:14; stroke-width:1.5; }
  #edgelayer .guest-outline { fill:none; stroke:#9aa5b1; stroke-width:2; stroke-dasharray:10 7; }
  #edgelayer .band-strip { fill:rgba(0,0,0,.028); }
  #edgelayer .band-strip.alt { fill:rgba(0,0,0,.055); }

  .lane-head { position:absolute; background:var(--card); border:2px solid; border-radius:10px;
    padding:9px 14px; font-weight:800; font-size:14px; box-shadow:0 3px 10px rgba(0,0,0,.08); }
  .lane-head small { display:block; font-weight:400; font-size:10.5px; color:var(--muted); line-height:1.5; }
  .lane-head.server { border-color:#1f2328; }
  .lane-head.host { border-color:var(--lan); }
  .lane-head.bmc { border-color:var(--mgmt); }

  /* 서버 내부 구성요소 헤더 (v7) — 복합 인프라의 열 제목 */
  .svc-head { position:absolute; transform:translateX(-50%); background:var(--card);
    border:1.5px dashed; border-radius:8px; padding:4px 8px; font-size:11.5px; font-weight:800;
    text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .svc-head small { display:block; font-weight:500; font-size:9.5px; color:var(--muted); line-height:1.45; white-space:normal; }

  .band-title { position:absolute; font-size:14px; font-weight:800; color:#3a434d;
    background:var(--card); border:1px solid var(--border); border-left:5px solid #3a434d;
    border-radius:6px; padding:5px 14px; box-shadow:0 2px 6px rgba(0,0,0,.06); }
  .band-title small { font-weight:500; color:var(--muted); margin-left:8px; font-size:11px; }

  .flow-lbl { position:absolute; transform:translate(-50%,-50%); background:var(--card);
    border:1px solid var(--border-soft); border-radius:7px; padding:4px 10px; font-size:11.5px; line-height:1.45;
    box-shadow:0 1px 4px rgba(0,0,0,.09); cursor:pointer; max-width:360px; text-align:center; white-space:nowrap; }
  .flow-lbl .ep { display:block; font-family:var(--mono); font-size:10.5px; font-weight:700; color:#0b5cad; }

  /* 간선 하단 요청·응답 미니카드 (v5) — 클릭 없이 전달값·응답 형태가 보인다 */
  .mini-wrap { position:absolute; transform:translate(-50%,0); display:flex; gap:5px; cursor:pointer;
    max-width:560px; justify-content:center; }
  .mini-card { font-size:9.5px; line-height:1.5; font-family:var(--mono); background:var(--card);
    border:1px solid var(--border-soft); border-radius:6px; padding:2px 7px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; max-width:275px; box-shadow:0 1px 3px rgba(0,0,0,.07); }
  .mini-card b { font-family:inherit; }
  .mini-card.mreq b { color:var(--lan); }
  .mini-card.mres { border-style:dashed; }
  .mini-wrap.dim { opacity:.12; pointer-events:none; }
  .mini-card:hover { border-color:var(--lan); }

  /* 미니카드 클릭 팝오버 (v6) — 사이드바를 열지 않고 그 자리에서 전문 확인 */
  .mini-pop { position:absolute; transform:translate(-50%,0); background:var(--card);
    border:1.5px solid var(--lan); border-radius:9px; padding:9px 13px; font-size:11.5px; line-height:1.6;
    max-width:460px; min-width:230px; box-shadow:0 8px 26px rgba(0,0,0,.18); z-index:22; text-align:left;
    white-space:normal; cursor:default; }
  .mini-pop .t { font-weight:800; font-size:11px; margin-bottom:3px; display:flex; align-items:center; gap:6px; }
  .mini-pop .full { font-family:var(--mono); font-size:11px; color:#2a3340; }
  .mini-pop pre { background:#1b1f24; color:#e6edf3; border-radius:6px; padding:8px 10px; margin:7px 0 3px;
    font-size:10.5px; font-family:var(--mono); line-height:1.5; overflow-x:auto; white-space:pre; max-height:220px; overflow-y:auto; }
  .mini-pop .cap { font-size:10px; font-weight:700; color:var(--muted); display:block; margin-top:6px; }
  .mini-pop a.more { display:inline-block; margin-top:6px; font-size:11px; color:var(--mgmt); text-decoration:none; font-weight:700; }
  .mini-pop a.more:hover { text-decoration:underline; }
  .mini-pop .x { position:absolute; right:8px; top:5px; border:none; background:none; cursor:pointer;
    color:var(--muted); font-size:13px; padding:2px; }
  .rt { display:inline-block; font-size:9px; font-weight:800; border-radius:7px; padding:0 6px; margin-right:4px;
    letter-spacing:.2px; vertical-align:1px; }
  .rt-script  { background:rgba(26,174,57,.14);  color:var(--done); }
  .rt-json    { background:rgba(0,117,222,.13);  color:var(--lan); }
  .rt-redfish { background:rgba(111,76,221,.13); color:var(--mgmt); }
  .rt-file    { background:rgba(221,91,0,.13);   color:#dd5b00; }
  .rt-text    { background:rgba(0,0,0,.07);      color:#3a434d; }
  .rt-dhcp, .rt-tftp { background:rgba(0,0,0,.07); color:#3a434d; }
  .rt-internal{ background:var(--yellow-bg);     color:var(--yellow); }
  .flow-lbl:hover { border-color:var(--lan); z-index:5; }
  .flow-lbl.dim { opacity:.12; pointer-events:none; }
  .flow-lbl.selected { outline:2.5px solid #1f2328; z-index:6; }
  .flow-lbl.note { background:var(--yellow-bg); border:1px dashed var(--yellow); white-space:normal; }
  .flow-lbl .dir { font-weight:800; margin-right:3px; }
  .flow-lbl.c-lan .dir{color:var(--lan);} .flow-lbl.c-mgmt .dir{color:var(--mgmt);} .flow-lbl.c-local .dir{color:var(--local);}

  /* ── 우측 슬라이드 사이드바 ── */
  #sidebar { position:absolute; top:96px; right:0; bottom:0; width:520px; max-width:92vw;
    background:var(--card); border-left:2px solid var(--border); box-shadow:-8px 0 28px rgba(0,0,0,.14);
    z-index:40; transform:translateX(102%); transition:transform .22s ease; display:flex; flex-direction:column; }
  #sidebar.show { transform:translateX(0); }
  #sb-head { padding:14px 18px 10px; border-bottom:1px solid var(--border-soft); }
  #sb-head h3 { margin:0 30px 6px 0; font-size:15px; line-height:1.4; }
  #sb-head .meta { display:flex; flex-wrap:wrap; gap:6px; font-size:11px; }
  .mchip { border:1px solid var(--border-soft); background:var(--bg); border-radius:10px; padding:1px 9px; font-weight:600; }
  .mchip.lan{color:var(--lan);} .mchip.mgmt{color:var(--mgmt);} .mchip.local{color:var(--local);}
  #sb-body { padding:12px 18px 30px; overflow-y:auto; flex:1; font-size:13px; line-height:1.75; }
  #sb-body h4 { margin:16px 0 6px; font-size:12px; color:var(--lan); text-transform:none; }
  #sb-body h4:first-child { margin-top:2px; }
  #sb-body p { margin:6px 0; }
  #sb-body pre { background:#1b1f24; color:#e6edf3; border-radius:7px; padding:11px 13px; margin:6px 0 12px;
    font-size:11.5px; font-family:var(--mono); line-height:1.55; overflow-x:auto; white-space:pre; }
  #sb-body .cap { display:block; font-size:11px; font-weight:700; color:var(--muted); margin-top:10px; }
  #sb-body table.fields { width:100%; border-collapse:collapse; font-size:12px; margin:6px 0 10px; }
  #sb-body table.fields td { border-bottom:1px solid var(--border-soft); padding:5px 8px; vertical-align:top; }
  #sb-body table.fields td:first-child { font-family:var(--mono); font-size:11px; white-space:nowrap; color:#0b5cad; }
  #sb-body .effect { border-left:3px solid var(--done); background:rgba(26,174,57,.07); padding:8px 12px;
    border-radius:0 6px 6px 0; margin:10px 0; font-size:12.5px; }
  #sb-body .basis { font-size:11px; color:var(--muted); margin-top:12px; border-top:1px dashed var(--border-soft); padding-top:8px; }
  #sb-body a.wikilink { color:var(--mgmt); text-decoration:none; }
  #sb-body a.wikilink:hover { text-decoration:underline; }
  #sb-close { position:absolute; right:14px; top:12px; border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Guest ↔ Provisioning Server 통신 캔버스</h1>
  <span class="sub"><b>위 → 아래 = 시간 순서 (Provisioning Step 밴드)</b> · 배경 드래그 = 이동 · 휠 = 줌 · 라벨 클릭 = 우측 상세</span>
  <div class="toolbar">
    <span id="phase-chips"></span>
    <span class="grp">
      <label><span class="lg lan"></span><input type="checkbox" checked data-f="c-lan"> LAN</label>
      <label><span class="lg mgmt"></span><input type="checkbox" checked data-f="c-mgmt"> MGMT</label>
      <label><span class="lg local"></span><input type="checkbox" checked data-f="c-local"> 내부</label>
    </span>
    <span class="grp">
      <label><span class="b done">구현됨</span><input type="checkbox" checked data-f="s-done"></label>
      <label><span class="b wip">구현 중</span><input type="checkbox" checked data-f="s-wip"></label>
      <label><span class="b planned">로드맵</span><input type="checkbox" checked data-f="s-planned"></label>
    </span>
    <span class="grp">
      <label><input type="checkbox" checked id="opt-mini" onchange="render()"> 요청·응답 카드</label>
    </span>
    <button class="act" onclick="fitView()">⤢ 화면 맞춤</button>
  </div>
</header>

<div id="viewport">
  <div id="world">
    <svg id="edgelayer"></svg>
    <!-- 레인 헤더 · 밴드 제목 · 라벨은 JS 렌더 -->
  </div>
</div>

<div id="sidebar">
  <button id="sb-close" onclick="closeSb()">✕</button>
  <div id="sb-head"><h3 id="sb-title"></h3><div class="meta" id="sb-meta"></div></div>
  <div id="sb-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  DATA — 슬라이스 진행 시 여기만 갱신
// ═══════════════════════════════════════════════════════════════════════════
const CHANGELOG = [
  'v7 (2026-07-19) — Provisioning Server 레인을 복합 인프라로 분해: dhcpd · tftpd · Spring WAS(+MariaDB·자산 디렉토리) 3열 신설, 화살선이 담당 구성요소 열에서 출발/도착(dhcp·tftp 는 색점 표식), 사이드바에 서버측 구성요소 칩 추가.',
  'v6 (2026-07-19) — 미니카드 클릭 = 경량 팝오버(해당 방향 전문 1블록 + 전체 상세 링크 — 사이드바 불요) + 라벨·미니카드 겹침 교정(라벨 실측 높이 기준 배치).',
  'v5 (2026-07-19) — 간선 상세 가시화: URI 강조 + 간선 아래 요청·응답 미니카드(전달값 → / 응답 형태 배지 ←)를 전 흐름(26개)에 상시 표시. 툴바 "요청·응답 카드" 토글로 접기 가능(행 높이 가변). 상세 전문은 기존대로 클릭 사이드바.',
  'v4 (2026-07-19) — E1-1 진단 리눅스 부팅 체인 구현 완료(CP5) — 체인로드·자산 다운로드 흐름을 구현됨으로 갱신(실측 계약 반영: /assets 서빙·provision_base·시리얼 콘솔·실패 폴백·DIAGNOSTIC_BOOTING). V7 실측 결과 주기.',
  'v3 (2026-07-18) — E1-0b 게스트 프로토콜 v1 구현 완료(CP5) — dispatch·체크인·보고·토큰 흐름을 구현됨으로 갱신. dhcpd filename 수동 flip 만 배치 잔여.',
  'v2 (2026-07-18) — Step 밴드 구조로 재편(시간순·라벨 겹침 해소) + 우측 사이드바 상세(형식·내부 구조·예시 전문).',
  'v1 (2026-07-18) — 최초 작성.',
];

const LANES = {
  server: { x:70,  w:560, cls:'server', color:'#1f2328', fill:'rgba(31,35,40,.03)',
    title:'Provisioning Server — 복합 인프라', sub:'한 대 안에서 dhcpd · tftpd · Spring WAS 가 협동 (격리망 192.168.1.10 NIC B / 운영자 UI 는 사내망 NIC A)' },
  host:   { x:1210, w:410, cls:'host', color:'#0075de', fill:'rgba(0,117,222,.035)',
    title:'Guest — 호스트 (일반 LAN 포트)', sub:'부팅 상태에 따라 역할이 바뀜: iPXE → 진단 리눅스(에이전트) → Anaconda → 설치 OS' },
  bmc:    { x:1750, w:410, cls:'bmc', color:'#6f4cdd', fill:'rgba(111,76,221,.035)',
    title:'Guest — BMC (MGMT 포트)', sub:'AST2600 · AMI MegaRAC — 호스트 전원과 무관하게 상시 동작 · Redfish API' },
};

// 서버 내부 구성요소 (v7) — Provisioning Server 는 단일 WAS 가 아니라 복합 인프라다.
// 각 흐름의 svc 필드가 "게스트가 실제로 대화하는 상대" 를 지정하고, 화살선이 그 열에서 출발/도착한다.
// (svc 생략 = was — HTTP 흐름 전부)
const SVC = {
  dhcpd: { x:86,  w:150, color:'#9a6700', title:'dhcpd', sub:'UDP 67/68 · IP 임대 — 수동 구축 (E1-I 관리 예정)' },
  tftp:  { x:248, w:140, color:'#57606a', title:'tftpd', sub:'UDP 69 · ipxe.efi — 수동 구축' },
  was:   { x:400, w:216, color:'#1f2328', title:'Spring WAS :7777', sub:'/boot · 에이전트 API · 자산 서빙 ⇄ MariaDB(상태·원장) · $PXE_ASSETS_ROOT' },
};
function svcOf(f) { return SVC[f.svc || 'was']; }

const BANDS = [
  { id:'infra', no:'①', title:'부팅 인프라', sub:'매 부팅 반복 — dhcpd·tftp (수동 구축분, 관리 UI 는 E1-I 예정)' },
  { id:'e1reg', no:'②', title:'등록 · 개시 대기', sub:'BOOTSTRAPPING — U1·E1-0a 구현 / 응답 스크립트는 E1-0b' },
  { id:'e1diag', no:'③', title:'진단 리눅스', sub:'DIAGNOSE_LINUX — 프로토콜 E1-0b · 부팅 자산 E1-1 (구현됨) · 수집 E1-2 (로드맵)' },
  { id:'e2', no:'④', title:'펌웨어 업데이트', sub:'FIRMWARE_UPDATING — E2 (가상 USB 선행 → Redfish 전환 목표)' },
  { id:'e3', no:'⑤', title:'BIOS · BMC 설정', sub:'FIRMWARE_SETTING — E3 · MGMT 통로 본격 사용' },
  { id:'e4', no:'⑥', title:'OS 설치 · 후처리', sub:'OS_INSTALLING · OS_SETTING — E4 · E5 (Kickstart 무인 설치)' },
  { id:'end', no:'⑦', title:'종단', sub:'completedAt → PROVISIONED — 로컬 부팅 폴스루' },
];

// from/to: server|host|bmc (note:true = 화살표 없는 내부 효과 — 해당 레인 위 노트)
// ch: lan|mgmt|local · st: done|wip|planned
// detail: kind(형식) · desc(풀어쓴 설명) · blocks[{cap,code}] · fields[[이름,설명]] · effect · basis

// ═══════════════════════════════════════════════════════════════════════════
const TOP = 214, BAND_HEAD = 52, BAND_PAD = 14, BAND_GAP = 34;   // v7 — svc 헤더 공간 확보
// 요청·응답 미니카드(v5) 표시 시 행이 한 층 더 필요하다 — 토글에 따라 행 높이 가변.
const ROW_BASE = 62, ROW_MINI = 106;
function showMini() { const el = document.getElementById('opt-mini'); return !el || el.checked; }
function rowH() { return showMini() ? ROW_MINI : ROW_BASE; }
function rowCenter() { return showMini() ? 30 : ROW_BASE / 2; }   // 화살선은 행 상단부, 미니카드는 그 아래
const ST_KO = { done:'구현됨', wip:'구현 중', planned:'로드맵' };
const CH_KO = { lan:'일반 LAN', mgmt:'MGMT 포트', local:'게스트 내부(KCS)' };
const RT_KO = { script:'iPXE script', json:'JSON', redfish:'Redfish JSON', file:'파일',
                text:'text', dhcp:'DHCP', tftp:'TFTP', internal:'내부 기록' };
const world = document.getElementById('world');
const viewport = document.getElementById('viewport');
const svg = document.getElementById('edgelayer');
let view = { x:0, y:0, s:0.55 }, selectedIdx = null, activePhase = 'all';
let bandY = {}, worldH = 0;
const WORLD_W = 2260;

function laneCx(l) { return LANES[l].x + LANES[l].w / 2; }
// v7 — 화살선 끝점: 서버 쪽은 담당 구성요소(svc) 열의 가장자리, 게스트 쪽은 레인 가장자리.
function edgeAnchors(f) {
  const box = k => k === 'server' ? svcOf(f) : LANES[k];
  const A = box(f.from), B = box(f.to);
  const a = A.x < B.x ? A.x + A.w : A.x;
  const b = A.x < B.x ? B.x : B.x + B.w;
  return [a, b];
}
function computeLayout() {
  let y = TOP;
  BANDS.forEach((b, bi) => {
    bandY[b.id] = { top:y, alt:bi % 2 === 1 };
    const rows = FLOWS.filter(f => f.band === b.id).length;
    y += BAND_HEAD + BAND_PAD + rows * rowH() + BAND_PAD + BAND_GAP;
    bandY[b.id].bottom = y - BAND_GAP;
  });
  worldH = y + 40;
  world.style.width = WORLD_W + 'px'; world.style.height = worldH + 'px';
  svg.setAttribute('width', WORLD_W); svg.setAttribute('height', worldH);
}
function render() {
  computeLayout();
  // SVG: 레인 배경 + 밴드 띠 + 화살선
  let s = '<defs>';
  ['lan','mgmt','local'].forEach(c => {
    const col = { lan:'#0075de', mgmt:'#6f4cdd', local:'#8b949e' }[c];
    s += `<marker id="ah-${c}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="${col}"/></marker>`;
  });
  s += '</defs>';
  // guest 묶음 외곽
  s += `<rect class="guest-outline" x="${LANES.host.x - 26}" y="26" width="${LANES.bmc.x + LANES.bmc.w - LANES.host.x + 52}" height="${worldH - 60}" rx="20"/>`;
  s += `<text x="${LANES.host.x - 10}" y="18" font-size="15" font-weight="800" fill="#57606a">Guest Server — 물리 서버 1대 (LAN 포트 + MGMT 포트)</text>`;
  // 레인 세로 배경
  Object.values(LANES).forEach(L => {
    s += `<rect class="lane-rect" x="${L.x}" y="40" width="${L.w}" height="${worldH - 80}" fill="${L.fill}" stroke="${L.color}" stroke-opacity=".45"/>`;
  });
  // 서버 내부 구성요소 열 (v7) — 복합 인프라의 세로 띠
  Object.values(SVC).forEach(v => {
    s += `<rect x="${v.x}" y="126" width="${v.w}" height="${worldH - 168}" rx="10" fill="${v.color}" fill-opacity=".035" stroke="${v.color}" stroke-opacity=".5" stroke-dasharray="5 4" stroke-width="1.3"/>`;
  });
  // 밴드 띠
  BANDS.forEach(b => {
    const by = bandY[b.id];
    s += `<rect class="band-strip${by.alt ? ' alt' : ''}" x="30" y="${by.top}" width="${WORLD_W - 60}" height="${by.bottom - by.top}" rx="10"/>`;
  });
  // 화살선
  FLOWS.forEach((f, i) => {
    if (f.note) return;
    const by = bandY[f.band];
    const rowIdx = FLOWS.filter(x => x.band === f.band).indexOf(f);
    const y = by.top + BAND_HEAD + BAND_PAD + rowIdx * rowH() + rowCenter();
    const [a, bx] = edgeAnchors(f);
    s += `<line class="flow c-${f.ch} s-${f.st}" data-i="${i}" x1="${a}" y1="${y}" x2="${bx}" y2="${y}" marker-end="url(#ah-${f.ch})" onclick="openSb(${i})"/>`;
    // 서버측 끝점에 담당 구성요소 점 표식 (dhcpd·tftp 만 — was 는 기본이라 생략)
    if ((f.from === 'server' || f.to === 'server') && f.svc && f.svc !== 'was') {
      const sx = f.from === 'server' ? a : bx;
      s += `<circle cx="${sx}" cy="${y}" r="5.5" fill="${svcOf(f).color}" stroke="#fff" stroke-width="1.5"/>`;
    }
  });
  svg.innerHTML = s;
  // HTML: 레인 헤더 + 밴드 제목 + 라벨
  world.querySelectorAll('.lane-head,.svc-head,.band-title,.flow-lbl,.mini-wrap,.mini-pop').forEach(e => e.remove());
  Object.entries(LANES).forEach(([k, L]) => {
    const d = document.createElement('div');
    d.className = 'lane-head ' + L.cls;
    d.style.left = L.x + 8 + 'px'; d.style.top = '48px'; d.style.width = (L.w - 16) + 'px';
    d.innerHTML = L.title + '<small>' + L.sub + '</small>';
    world.appendChild(d);
  });
  // 서버 내부 구성요소 헤더 (v7)
  Object.values(SVC).forEach(v => {
    const d = document.createElement('div');
    d.className = 'svc-head';
    d.style.left = (v.x + v.w / 2) + 'px'; d.style.top = '134px'; d.style.width = (v.w - 10) + 'px';
    d.style.borderColor = v.color; d.style.color = v.color;
    d.innerHTML = v.title + '<small>' + v.sub + '</small>';
    world.appendChild(d);
  });
  BANDS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'band-title';
    d.style.left = '48px'; d.style.top = (bandY[b.id].top + 8) + 'px';
    d.innerHTML = b.no + ' ' + b.title + '<small>' + b.sub + '</small>';
    world.appendChild(d);
  });
  FLOWS.forEach((f, i) => {
    const by = bandY[f.band];
    const rowIdx = FLOWS.filter(x => x.band === f.band).indexOf(f);
    const y = by.top + BAND_HEAD + BAND_PAD + rowIdx * rowH() + rowCenter();
    const d = document.createElement('div');
    d.className = `flow-lbl c-${f.ch} s-${f.st}` + (f.note ? ' note' : '');
    d.dataset.i = i;
    let lx;
    if (f.note) {
      // 서버 내부 노트는 담당 구성요소(svc) 열 중앙에 — 원장·판정 기록은 WAS(+DB)의 일이다.
      lx = f.from === 'server' ? svcOf(f).x + svcOf(f).w / 2 : laneCx(f.from);
    } else {
      const [a, bx] = edgeAnchors(f);
      lx = (a + bx) / 2;
    }
    d.style.left = lx + 'px'; d.style.top = y + 'px';
    const dirMark = f.note ? '' : (LANES[f.from].x < LANES[f.to].x ? '→' : '←');
    d.innerHTML = `<span class="dir">${dirMark}</span>${f.lbl} <span class="b ${f.st}">${ST_KO[f.st]}</span><span class="ep">${f.ep}</span>`;
    d.onclick = () => openSb(i);
    world.appendChild(d);
    // v5 — 간선 아래 요청·응답 미니카드. v6 — 라벨 실측 높이 기준 배치(겹침 방지) + 클릭 팝오버.
    if (showMini() && f.mini) {
      const mc = document.createElement('div');
      mc.className = `mini-wrap c-${f.ch} s-${f.st}`;
      mc.dataset.i = i;
      // 라벨(pill)은 y 중심 정렬이라 실제 높이의 절반만큼 아래로 내려온다 — 실측 높이로 겹침 없이 배치.
      const miniTop = y + d.offsetHeight / 2 + 5;
      mc.style.left = lx + 'px'; mc.style.top = miniTop + 'px';
      const mkCard = (cls, html, side) => {
        const sp = document.createElement('span');
        sp.className = 'mini-card ' + cls;
        sp.innerHTML = html;
        sp.onclick = ev => { ev.stopPropagation(); openMiniPop(i, side, lx, miniTop + 24); };
        return sp;
      };
      mc.appendChild(mkCard('mreq', `<b>→</b> ${f.mini.req}`, 'req'));
      mc.appendChild(mkCard('mres', `<span class="rt rt-${f.mini.rt}">${RT_KO[f.mini.rt] || f.mini.rt}</span>${f.mini.res}`, 'res'));
      mc.onclick = () => openSb(i);
      world.appendChild(mc);
    }
  });
  applyFilters();
}
// ── 미니카드 팝오버 (v6) — 사이드바 없이 그 자리에서 전문 확인 ──
function closeMiniPop() { world.querySelectorAll('.mini-pop').forEach(e => e.remove()); }
function pickBlock(f, side) {
  if (!f.blocks || !f.blocks.length) return null;
  const kw = side === 'req' ? ['요청', '명령', '쿼리', 'DISCOVER']
                            : ['응답', '스크립트', '출력', 'OFFER', '원장', '이미지', '전송물', '판정', '보고'];
  return f.blocks.find(b => kw.some(k => b.cap.includes(k))) || f.blocks[0];
}
function openMiniPop(i, side, lx, top) {
  closeMiniPop();
  const f = FLOWS[i], m = f.mini;
  const isReq = side === 'req';
  const title = isReq ? '<b>→</b> 요청 — 전달값'
                      : `<span class="rt rt-${m.rt}">${RT_KO[m.rt] || m.rt}</span> 응답`;
  const block = pickBlock(f, side);
  const pop = document.createElement('div');
  pop.className = 'mini-pop';
  pop.style.left = lx + 'px'; pop.style.top = top + 'px';
  pop.innerHTML =
    `<button class="x" title="닫기">✕</button>` +
    `<div class="t">${title}</div>` +
    `<div class="full">${escapeHtml(isReq ? m.req : m.res)}</div>` +
    (block ? `<span class="cap">${escapeHtml(block.cap)}</span><pre>${escapeHtml(block.code)}</pre>` : '') +
    `<a href="#" class="more">전체 상세 (사이드바) ⟶</a>`;
  pop.querySelector('.x').onclick = ev => { ev.stopPropagation(); closeMiniPop(); };
  pop.querySelector('.more').onclick = ev => { ev.preventDefault(); ev.stopPropagation(); closeMiniPop(); openSb(i); };
  pop.onclick = ev => ev.stopPropagation();
  world.appendChild(pop);
}
// ── 사이드바 상세 ──
function openSb(i) {
  const f = FLOWS[i];
  selectedIdx = i;
  document.querySelectorAll('.flow.selected,.flow-lbl.selected').forEach(x => x.classList.remove('selected'));
  document.querySelectorAll(`[data-i="${i}"]`).forEach(x => x.classList.add('selected'));
  document.getElementById('sb-title').textContent = f.lbl;
  const band = BANDS.find(b => b.id === f.band);
  document.getElementById('sb-meta').innerHTML =
    `<span class="mchip">${band.no} ${band.title}</span>` +
    `<span class="mchip ${f.ch}">${CH_KO[f.ch]}</span>` +
    `<span class="mchip">${ST_KO[f.st]} · ${f.slice}</span>` +
    `<span class="mchip">${f.note ? '내부 효과' : f.from + ' → ' + f.to}</span>` +
    ((f.from === 'server' || f.to === 'server') ? `<span class="mchip">서버측: ${svcOf(f).title}</span>` : '') +
    `<span class="mchip">${f.kind}</span>`;
  let h = `<h4>무엇이 오가는가</h4><p>${f.desc}</p>`;
  (f.blocks || []).forEach(b => {
    h += `<span class="cap">${b.cap}</span><pre>${escapeHtml(b.code)}</pre>`;
  });
  if (f.fields && f.fields.length) {
    h += '<h4>구성 요소 · 주의</h4><table class="fields">' +
      f.fields.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + '</table>';
  }
  if (f.effect) h += `<div class="effect"><b>효과</b> — ${f.effect}</div>`;
  if (f.basis) h += `<div class="basis">근거 · 참조 — ${f.basis}</div>`;
  // 위키식 내부 링크 — 시간순 이전/다음 + 같은 단계의 다른 흐름 ([[링크]] 네비게이션)
  const sameBand = FLOWS.map((x, j) => ({ x, j })).filter(o => o.x.band === f.band && o.j !== i);
  h += '<h4>연결 문서</h4><p style="font-size:12px;">' +
    (i > 0 ? `<a href="#" class="wikilink" data-go="${i - 1}">⟵ 이전 — [[${FLOWS[i - 1].lbl}]]</a><br>` : '') +
    (i < FLOWS.length - 1 ? `<a href="#" class="wikilink" data-go="${i + 1}">다음 — [[${FLOWS[i + 1].lbl}]] ⟶</a><br>` : '') +
    '</p>';
  if (sameBand.length) {
    h += `<p style="font-size:12px;color:var(--muted);">같은 단계(${band.no} ${band.title})의 흐름:</p><p style="font-size:12px;">` +
      sameBand.map(o => `<a href="#" class="wikilink" data-go="${o.j}">[[${o.x.lbl}]]</a>`).join('<br>') + '</p>';
  }
  document.getElementById('sb-body').innerHTML = h;
  document.getElementById('sb-body').querySelectorAll('.wikilink').forEach(a =>
    a.addEventListener('click', ev => { ev.preventDefault(); openSb(parseInt(a.dataset.go)); }));
  document.getElementById('sb-body').scrollTop = 0;
  document.getElementById('sidebar').classList.add('show');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('show');
  selectedIdx = null;
  document.querySelectorAll('.flow.selected,.flow-lbl.selected').forEach(x => x.classList.remove('selected'));
}
function escapeHtml(t) { return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
// ── 필터 · 단계 칩 ──
function applyFilters() {
  const on = {};
  document.querySelectorAll('.toolbar input[data-f]').forEach(cb => on[cb.dataset.f] = cb.checked);
  FLOWS.forEach((f, i) => {
    const visible = on['c-' + f.ch] && on['s-' + f.st];
    const inPhase = activePhase === 'all' || f.band === activePhase;
    document.querySelectorAll(`[data-i="${i}"]`).forEach(el =>
      el.classList.toggle('dim', !visible || !inPhase));
  });
}
const chipWrap = document.getElementById('phase-chips');
chipWrap.innerHTML = '<button class="chip active" data-ph="all">전체</button>' +
  BANDS.map(b => `<button class="chip" data-ph="${b.id}">${b.no} ${b.title}</button>`).join('');
chipWrap.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  chipWrap.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); activePhase = c.dataset.ph;
  applyFilters();
  if (activePhase !== 'all') {   // 해당 밴드로 이동
    const by = bandY[activePhase];
    view.y = -(by.top - 20) * view.s + 0; applyView();
  }
}));
document.querySelectorAll('.toolbar input[data-f]').forEach(cb => cb.addEventListener('change', applyFilters));
// ── 팬 / 줌 ──
function applyView() { world.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.s})`; }
function fitView() {
  const vw = viewport.clientWidth;
  view.s = Math.min(1, (vw - 40) / WORLD_W);
  view.x = 20; view.y = 10; applyView();
}
viewport.addEventListener('wheel', ev => {
  ev.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  const factor = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
  const ns = Math.min(2.2, Math.max(0.18, view.s * factor));
  view.x = mx - (mx - view.x) * (ns / view.s);
  view.y = my - (my - view.y) * (ns / view.s);
  view.s = ns; applyView();
}, { passive:false });
let drag = null;
viewport.addEventListener('mousedown', ev => {
  if (ev.target.closest('.mini-pop')) return;                 // 팝오버 내부 조작
  if (!ev.target.closest('.mini-card')) closeMiniPop();       // 배경·라벨 클릭 = 팝오버 닫기
  if (ev.target.closest('.flow-lbl') || ev.target.closest('.mini-wrap') || ev.target.closest('#sidebar')) return;
  drag = { sx:ev.clientX, sy:ev.clientY, ox:view.x, oy:view.y };
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', ev => {
  if (!drag) return;
  view.x = drag.ox + (ev.clientX - drag.sx);
  view.y = drag.oy + (ev.clientY - drag.sy);
  applyView();
});
window.addEventListener('mouseup', () => { drag = null; viewport.classList.remove('panning'); });
// init
render();
fitView();
</script>
</body>
</html>
