# S3.2 (K2) — Boot fail-fast 검증 전용 properties.
# SecurityPropertiesValidator 가 빈 allowed-roots / multipart cap 불일치 시 컨텍스트 시작을 중단하는지 회귀.
# 본 파일을 직접 활성화하면 어플리케이션 부팅이 항상 IllegalStateException 으로 실패해야 한다.

spring.application.name=ServerProvision-fail-fast-test
server.port=0
spring.datasource.url=jdbc:h2:mem:fail-fast-test
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# K2 — 의도적으로 비워둔다 (빈 list). SecurityPropertiesValidator 가 IllegalStateException 발생.
provision.path.allowed-roots=

# upload size 항목은 정상 (allowed-roots 만으로도 fail-fast 가 발동)
provision.upload.max-file-size=5GB
provision.upload.max-request-size=20GB
provision.upload.max-folder-files=5000
provision.upload.max-tree-bytes=20GB
provision.upload.max-zip-uncompressed-bytes=20GB
provision.upload.zip-bomb-ratio=100
provision.upload.max-zip-entries=10000
provision.upload.executable-binary-policy=DENY
provision.upload.executable-scan-sample-size=50
provision.upload.suspicious-filenames-policy=DISABLED
provision.browse.max-entries=2000
provision.browse.max-depth=8
