spring.application.name=ServerProvision

server.port=7778
server.address=localhost

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 파일 업로드 설정 (BIOS/BMC 펌웨어 최대 수백 MB, OS ISO 최대 ~10GB 수용)
spring.servlet.multipart.max-file-size=12GB
spring.servlet.multipart.max-request-size=12GB
upload.base-dir=${UPLOAD_BASE_DIR:/var/serverprovision/uploads}