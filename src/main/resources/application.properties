spring.application.name=ServerProvision

server.port=${SERVER_PORT}
server.address=localhost

# PXE 서버의 OS 설치 소스 HTTP URL (예: http://192.168.1.1/rocky9)
# 미설정 시 Kickstart 스크립트 요청이 500 Internal Server Error 로 실패한다.
pxe.server.install-source-url=${PXE_INSTALL_SOURCE_URL:}

# PXE 서버 자체의 HTTP base URL (예: http://192.168.1.100:7777)
# Kickstart URL 등 서버 콜백 주소 구성에 사용된다.
pxe.server.base-url=${PXE_SERVER_BASE_URL:}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA — 초기 테이블(os_image, iso) 생성 완료 후 validate 모드로 고정한다.
# Hibernate 가 더 이상 DDL 을 건드리지 않으며, 부팅 시 엔티티 ↔ 스키마 일치만 검증한다.
# 엔티티 필드 추가 등 스키마 변경이 필요하면 ALTER 권한을 가진 관리자 계정으로 수동 반영한다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 파일 업로드 설정.
# OS ISO 는 현실적으로 12GB 를 넘는 경우도 많아 (Windows Server, 여러 language pack 포함 DVD 등)
# Spring Boot 4.x + DataSize 파서는 '-1' 을 unlimited 로 안정적으로 해석하지 못하는 경우가 있어
# 명시적 상한값으로 고정한다 (64GB — 실용상 업로드 가능한 최대치).
# 디스크 용량은 업로드 디렉터리 자체 모니터링으로 관리해야 한다.
spring.servlet.multipart.max-file-size=64GB
spring.servlet.multipart.max-request-size=64GB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
# Spring Boot 4.x (Tomcat 11) 신규 제약들.
# 기본값이 매우 작아 (maxPartCount≈10) 폴더 업로드처럼 multipart part 가 여러 개면 즉시 거절된다.
# Gigabyte 서버 BIOS 번들은 RBU/ · SPI_UPD/ · .nsh 등 파일 수가 쉽게 수십 개를 넘는다.
server.tomcat.max-part-count=10000
server.tomcat.max-parameter-count=10000
# 깊은 상대경로를 Content-Disposition 헤더에 실으므로 per-part 헤더 상한도 여유 있게.
server.tomcat.max-part-header-size=16KB
upload.base-dir=${UPLOAD_BASE_DIR:/var/serverprovision/uploads}

# Stage S1 — BackgroundJob pruner 설정 (in-memory 보관 한도)
job.retention.max-count=100
job.retention.keep-after-terminal-ms=600000
job.retention.prune-interval-ms=60000

# Stage 2 / MK1 — Path Reconciliation
# .provision.json 마커의 HMAC 비밀 키. 운영 환경에서는 반드시 PROVISION_MARKER_SECRET 환경변수로 override.
provision.marker.secret=${PROVISION_MARKER_SECRET:change-me-before-prod-deploy}
# 부팅 시 1회 자동 quick scan 활성 여부.
reconciliation.scan.startup-enabled=true
# Quick 주기 (default 1h) — 마커 서명만 검증, 자원 내용 변조는 못 잡음.
reconciliation.scan.interval-ms=3600000
# Deep 주기 (default 24h) — manifestHash 재계산. ISO 12GB 면 수십 초~수 분 부담.
reconciliation.scan.deep-interval-ms=86400000
# PATH_DRIFT 자동 적용 여부 — default false (관리자가 페이지에서 수동 적용 권장).
reconciliation.auto-apply-path-drift=false
# 보고서 이력 보관 한도 (FIFO prune). 새 보고서 생성 시 카운트 초과면 가장 오래된 행 삭제.
reconciliation.report.retention-count=100
# 추가 스캔 루트 (콤마 구분). DB 자원 path.parent union 외에 명시 추가가 필요할 때.
reconciliation.scan.extra-roots=
