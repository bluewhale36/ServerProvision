spring.application.name=ServerProvision
server.port=${SERVER_PORT}
server.address=localhost
# PXE 서버의 OS 설치 소스 HTTP URL (예: http://192.168.1.1/rocky9)
# 미설정 시 Kickstart 스크립트 요청이 500 Internal Server Error 로 실패한다.
pxe.server.install-source-url=${PXE_INSTALL_SOURCE_URL:}
# PXE 서버 자체의 HTTP base URL (예: http://192.168.1.100:7777)
# Kickstart URL 등 서버 콜백 주소 구성에 사용된다.
pxe.server.base-url=${PXE_SERVER_BASE_URL:}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# JPA — 초기 테이블(os_metadata, iso) 생성 완료 후 validate 모드로 고정한다.
# Hibernate 가 더 이상 DDL 을 건드리지 않으며, 부팅 시 엔티티 ↔ 스키마 일치만 검증한다.
# 엔티티 필드 추가 등 스키마 변경이 필요하면 ALTER 권한을 가진 관리자 계정으로 수동 반영한다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# ─────────────────────────── 로깅 (LOG L1 — 상관관계 인프라) ───────────────────────────
# RequestCorrelationFilter 가 MDC requestId 를 심고 logback-spring.xml 의 %X{requestId} 슬롯이 방출한다.
# dev 는 도메인 패키지 DEBUG(http.request.start 등 진단). 운영 INFO 전환은 LOG L4(prod 프로파일)에서.
logging.level.com.example.serverprovision=DEBUG
# bare @Async 가 쓰는 Boot 자동구성 executor 스레드명 prefix (MdcTaskDecorator 가 requestId 전파).
spring.task.execution.thread-name-prefix=async-
# HF-2 — 부모-자식 lifecycle cascade 의 자식당 dirty-checking UPDATE 를 단일 JDBC 배치 왕복으로 묶는다.
# (해당 경로에 N+1 SELECT 는 없음 — 3-렌즈 검증 완료. 본 설정은 N 개 UPDATE 의 네트워크 왕복을 묶는 전역 위생 튜닝.)
# IDENTITY 키라 INSERT 배칭은 적용되지 않으나 UPDATE / DELETE 는 묶인다. 모든 write 경로가 전역 수혜.
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_updates=true
# 파일 업로드 설정.
# C8 — Spring multipart cap 과 application 가드 (provision.upload.*) 이 sync 되도록 동일 변수 참조.
# Spring multipart cap 이 더 크면 multipart resolver 단계의 1차 차단이 무력화되어 application 가드까지
# 큰 페이로드가 transfer 된다. SecurityPropertiesValidator 가 부팅 시 양자 정합성을 검증.
spring.servlet.multipart.max-file-size=${provision.upload.max-file-size}
spring.servlet.multipart.max-request-size=${provision.upload.max-request-size}
# C6 — 임시 multipart 파일을 default /tmp 가 아닌 전용 디렉토리에 저장 (multi-user 호스트 권한 누설 방어).
# UploadTempDirectoryProvider 도 동일 디렉토리를 zip 검사용 임시 파일에 사용한다.
spring.servlet.multipart.location=${MULTIPART_TMP_DIR:/tmp/provision-multipart}
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
# Spring Boot 4.x (Tomcat 11) 신규 제약들.
# 기본값이 매우 작아 (maxPartCount≈10) 폴더 업로드처럼 multipart part 가 여러 개면 즉시 거절된다.
# Gigabyte 서버 BIOS 번들은 RBU/ · SPI_UPD/ · .nsh 등 파일 수가 쉽게 수십 개를 넘는다.
server.tomcat.max-part-count=10000
server.tomcat.max-parameter-count=10000
# 깊은 상대경로를 Content-Disposition 헤더에 실으므로 per-part 헤더 상한도 여유 있게.
server.tomcat.max-part-header-size=16KB
upload.base-dir=${UPLOAD_BASE_DIR:/var/serverprovision/uploads}
# Stage S1 — BackgroundJob pruner 설정 (in-memory 보관 한도)
job.retention.max-count=100
job.retention.keep-after-terminal-ms=600000
job.retention.prune-interval-ms=60000
# Stage 2 / MK1 — Path Reconciliation
# .provision.json 마커의 HMAC 비밀 키. 운영 환경에서는 반드시 PROVISION_MARKER_SECRET 환경변수로 override.
provision.marker.secret=${PROVISION_MARKER_SECRET:change-me-before-prod-deploy}
# 부팅 시 1회 자동 quick scan 활성 여부.
reconciliation.scan.startup-enabled=true
# Quick 주기 (default 1h) — 마커 서명만 검증, 자원 내용 변조는 못 잡음.
reconciliation.scan.interval-ms=3600000
# Deep 주기 (default 24h) — manifestHash 재계산. ISO 12GB 면 수십 초~수 분 부담.
reconciliation.scan.deep-interval-ms=86400000
# PATH_DRIFT 자동 적용 여부 — default false (관리자가 페이지에서 수동 적용 권장).
reconciliation.auto-apply-path-drift=false
# MK3-1 — GHOST_DB_ROW 자동 적용 여부. default false (사용자 사후 검토 시간 보장).
# ghost = is_deleted=true AND trashed_at=null AND trashed_path=null AND Files.notExists(path).
# 정의상 무손실이라 true 도 합리적이나 운영 안정 후 default 화 검토.
reconciliation.auto-apply-ghost-row=false
# 보고서 이력 보관 한도 (FIFO prune). 새 보고서 생성 시 카운트 초과면 가장 오래된 행 삭제.
reconciliation.report.retention-count=100
# 추가 스캔 루트 (콤마 구분). DB 자원 path.parent union 외에 명시 추가가 필요할 때.
reconciliation.scan.extra-roots=${RECONCILIATION_SCAN_EXTRA_ROOTS}
# MK3 — 자동 정합 전역 OFF 옵션 (DCN-NEW11). default true. 운영 환경별 세밀한 제어 시 false.
reconciliation.auto-apply=true
# Stage 2 / MK3 — Trash 패턴 (soft-delete 자원 격리)
# trash root (DCN1=a). default = <provision-base>/.soft-deleted.
# macOS 가 `.trash` 이름을 OS 가 special 로 취급해 일반 디렉토리로 사용 불가하므로 `.soft-deleted` 로 명명.
# 운영 환경에서 PROVISION_TRASH_ROOT 환경변수 override.
trash.root=${PROVISION_TRASH_ROOT:/opt/provisioning/.soft-deleted}
# TTL 30일 자동 purge (DCN4=b). 자원별 연장 (DCN-NEW4=a) 은 UI 에서 가능.
trash.ttl.days=30
# TTL purge / notify cron — 매시간 정각. 운영 부하 시 6시간 등으로 낮춤.
trash.ttl.purge-cron=0 0 * * * *
trash.ttl.notify-cron=0 0 * * * *
# ─────────────────────────── Stage S3 / S3.1 — Security Hardening ───────────────────────────
# Path 보안 — 미설정 / 빈 값이면 boot fail-fast (SecurityPropertiesValidator).
# S3.1 (A1) — default 값이 있으면 fail-fast 가 발동 안 하므로 default 제거.
# 운영 환경: PROVISION_ALLOWED_ROOTS=/opt/iso,/opt/bios,/opt/firmware,/opt/subprogram 환경변수 필수.
provision.path.allowed-roots=${PROVISION_ALLOWED_ROOTS:}
# 업로드 size / count
provision.upload.max-file-size=15GB
provision.upload.max-request-size=20GB
provision.upload.max-folder-files=5000
provision.upload.max-tree-bytes=20GB
# Zip bomb 가드
provision.upload.max-zip-uncompressed-bytes=20GB
provision.upload.zip-bomb-ratio=100
provision.upload.max-zip-entries=10000
# C7 — STORED entry (compressed=0) 의 단일 size 임계 (ratio 검사 우회 방어).
provision.upload.max-stored-entry-bytes=5GB
# C6 — provision.upload 가 사용하는 임시 디렉토리. spring.servlet.multipart.location 과 동일.
provision.upload.temp-dir=${MULTIPART_TMP_DIR:/tmp/provision-multipart}
# Content 가드 (S3 v2 § 2.5) — 의도적 악성 파일 시나리오
# 실행 binary 정책 : DENY | WARN | ALLOW (default DENY)
# 본 앱은 BIOS/BMC 펌웨어·드라이버(실행형 .efi / PE / ELF)를 올리는 게 본업 → ALLOW.
# 실행형이 정상 페이로드라 DENY/WARN 은 정상 펌웨어를 거짓 차단/경고한다.
# 보안은 path-traversal / zip-bomb / HMAC 마커 / allowed-roots 가드가 담당.
provision.upload.executable-binary-policy=ALLOW
provision.upload.executable-scan-sample-size=50
# 위험 파일명 정책 : DISABLED | WARN | DENY (default DISABLED)
provision.upload.suspicious-filenames-policy=DISABLED
# Browse / FileSystem 한도 (S3.2 K15 — prefix 는 운영자 환경 호환을 위해 그대로 유지하지만
# max-depth 는 Browse 외에도 모든 Files.walk 호출 (UploadLimitsPolicy / FileSystemHardener /
# BundleEntrypointDetector / BundleTreeCleanupService) 에서 일괄 적용된다).
provision.browse.max-entries=2000
provision.browse.max-depth=8
# 등록 INFRA/TRANSIENT 실패 시 오펀 파일 격리 디렉토리 (recoverable saga, 도메인 무관).
# R1-4-4 — 구 iso.quarantine.* 에서 orphan.quarantine.* 로 일반화. active 업로드 트리 밖의 별도 루트.
orphan.quarantine.root=${PROVISION_ISO_QUARANTINE_ROOT:/opt/provisioning/.iso-quarantine}
# 격리 PENDING 자동 폐기 TTL(일). trash(30일)보다 짧게.
orphan.quarantine.ttl-days=7
# TTL reaper cron — 매시 :30 (trash purge :00 과 부하 분산).
orphan.quarantine.purge-cron=0 30 * * * *
# MK3-2 (DCM3-2.10) — softDelete reject 정책 feature flag.
# default false (도입 직후 — 기존 동작 보존, ghost 신규 생성 가능).
# 운영 검증 후 true 전환 시 사전조건 (Files.exists(DB.path)) 검증 활성화 + modal 3택 진입.
# 토글로 즉시 롤백 가능 — 진행 중 intent token 은 5분 후 자연 만료.
provision.softdelete.reject-on-missing=false
# ─────────────────────────── provisioning — BIOS 셋업 (임시방편) ───────────────────────────
# Redfish BiosAttributeRegistry(JSON) + AMI SetupData(XML) + initial_settings 를 lazy 파싱.
# 자료 파일은 git 비추적 외부 자산 — 기본은 프로젝트 루트의 redfish_materials/ (작업 디렉토리 기준 상대) 에서 읽는다.
# 운영은 PROVISION_BIOS_MATERIALS_DIR 절대경로로 override. classpath: 접두어를 주면 번들 리소스로도 로드 가능.
# 보드는 인덱스 리스트로 바인딩해 key 를 원본 그대로 보존(map-key relaxed binding 함정 회피).
# 향후 BoardModel 자원 도메인 병합 + DB 기반 프리셋으로 대체 예정(현재는 파일 파싱).
provisioning.bios.resource-base=${PROVISION_BIOS_MATERIALS_DIR:redfish_materials}
provisioning.bios.boards[0].key=MS03-CE0
provisioning.bios.boards[0].registry=BiosAttributeRegistry_MS03-CE0.json
provisioning.bios.boards[0].setup-data=SetupData_MS03-CE0.xml
provisioning.bios.boards[1].key=MS73-HB1
provisioning.bios.boards[1].registry=BiosAttributeRegistry_MS73-HB1.json
provisioning.bios.boards[1].setup-data=SetupData_MS73-HB1.xml
provisioning.bios.boards[2].key=MS04-CE0
provisioning.bios.boards[2].registry=BiosAttributeRegistry_MS04-CE0.json
provisioning.bios.boards[2].setup-data=SetupData_MS04-CE0.xml
# MS74-HB0 만 실제 보드 현재값(initial_settings, Redfish GET .../Bios) 보유 — 나머지 보드는 레지스트리 기본값 표시.
provisioning.bios.boards[3].key=MS74-HB0
provisioning.bios.boards[3].registry=BiosAttributeRegistry_MS74-HB0.json
provisioning.bios.boards[3].setup-data=SetupData_MS74-HB0.xml
provisioning.bios.boards[3].initial-settings=initial_settings.md
