<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--
  공통 레이아웃 프래그먼트
  ─────────────────────────────────────────────────────────────
  commonHead(pageTitle)
    · pageTitle : 브라우저 탭 제목 (예: 'OS 이미지 관리')
    · 배경 작업 알림 센터용 CSS/JS 를 모든 페이지에 공통 로드한다.

  navbar(activePage)
    · activePage 키
        Management   : 'os-image' | 'board' | 'bios' | 'bmc' | 'driver'
        Maintenance  : 'reconciliation'
        Provisioning : 'setting' | 'server'
    · 구현 완료 메뉴는 <a>, 미구현은 <span aria-disabled="true"> 로 남겨
      페이지가 완성될 때 태그만 교체한다.
    · 오른쪽 끝에는 서류가방 아이콘(.n-nav-bgjob) 과 드롭다운 패널이 있어
      장시간 실행되는 모든 배경 작업(추출·업로드·인덱싱·경로 재조정) 을 통합 표시한다.
  ─────────────────────────────────────────────────────────────
-->

<head>
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="'유니와이드 - ' + ${pageTitle}">유니와이드</title>
        <!-- Inter 폰트 -->
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
        <!-- Bootstrap 5: 그리드, 유틸리티 -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <!-- Notion 디자인 시스템 (Bootstrap 이후 로드해서 시각 스타일 덮어쓰기) -->
        <link rel="stylesheet" th:href="@{/global/style.css}">
        <link rel="stylesheet" th:href="@{/css/form-validation.css}">
        <link rel="stylesheet" th:href="@{/css/table-list.css}">
        <!-- 배경 작업 알림 센터 (모든 페이지 공통) -->
        <link rel="stylesheet" th:href="@{/global/background-jobs.css}">
        <script th:src="@{/global/background-jobs.js}" defer></script>
        <!-- Service Worker 기반 background 업로드 등록기. 모든 페이지에서 window.BackgroundUpload 사용 가능. -->
        <script th:src="@{/global/upload-client.js}" defer></script>
    </th:block>
</head>

<body>
<nav th:fragment="navbar(activePage)" class="n-nav">
    <a th:href="@{/management/os}" class="n-nav-brand">Provision Portal</a>

    <!-- Maintenance -->
    <a th:href="@{/management/os}"
       class="n-nav-link"
       th:classappend="${activePage == 'os-image'} ? ' active'">OS 이미지</a>
    <a th:href="@{/management/board}"
       class="n-nav-link"
       th:classappend="${activePage == 'board'} ? ' active'">메인보드</a>
    <a th:href="@{/management/bios}"
       class="n-nav-link"
       th:classappend="${activePage == 'bios'} ? ' active'">BIOS</a>
    <a th:href="@{/management/bmc}"
       class="n-nav-link"
       th:classappend="${activePage == 'bmc'} ? ' active'">BMC</a>
    <span class="n-nav-link" aria-disabled="true" title="미구현">Driver</span>

    <!-- Maintenance (어플리케이션-서버 운영) -->
    <a th:href="@{/maintenance/reconciliation}"
       class="n-nav-link"
       th:classappend="${activePage == 'reconciliation'} ? ' active'">경로 점검</a>

    <!-- Provisioning -->
    <span class="n-nav-link" aria-disabled="true" title="미구현">세팅 정의서</span>
    <span class="n-nav-link" aria-disabled="true" title="미구현">서버</span>

    <!-- 오른쪽 끝: 배경 작업 조회 아이콘 + 드롭다운 패널 -->
    <div class="n-nav-spacer"></div>
    <button type="button"
            id="bgjobTrigger"
            class="n-nav-bgjob"
            aria-label="배경 작업"
            aria-expanded="false"
            aria-controls="bgjobPanel">
        <!-- 서류가방 아이콘 (Material/Lucide 스타일) -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <span id="bgjobDot" class="n-nav-bgjob-dot" hidden></span>
    </button>
    <div id="bgjobPanel"
         class="n-nav-bgjob-panel"
         role="dialog"
         aria-labelledby="bgjobPanelTitle"
         hidden>
        <div class="n-nav-bgjob-panel-header">
            <h2 id="bgjobPanelTitle">
                배경 작업
                <span id="bgjobCount" class="n-nav-bgjob-count">(0)</span>
            </h2>
            <button type="button" id="bgjobClear" class="n-nav-bgjob-clear" disabled>모두 지우기</button>
        </div>
        <div class="n-nav-bgjob-panel-body">
            <div id="bgjobEmpty" class="n-nav-bgjob-empty">진행 중인 작업이 없습니다.</div>
            <ul id="bgjobList" class="n-nav-bgjob-list" hidden></ul>
        </div>
    </div>
</nav>
</body>

</html>
