<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--
  공통 레이아웃 프래그먼트
  ─────────────────────────────────────────────────────────────
  commonHead(pageTitle)
    · pageTitle : 브라우저 탭 제목 (예: '대시보드')
    · 모든 페이지에 공통으로 필요한 <meta>, <title>, 폰트, Bootstrap CSS,
      글로벌 CSS 를 삽입합니다.

  navbar(activePage)
    · activePage : 현재 활성 메뉴 키
        'dashboard' | 'os' | 'setting' | 'order'
  ─────────────────────────────────────────────────────────────
-->

<head>
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="'유니와이드 - ' + ${pageTitle}">유니와이드</title>
        <!-- Inter 폰트 -->
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
        <!-- Bootstrap 5: 그리드, 유틸리티, 아코디언, 프로그레스바 -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <!-- Notion 디자인 시스템: Bootstrap 이후 로드하여 시각 스타일 덮어쓰기 -->
        <link rel="stylesheet" th:href="@{/global/style.css}">
        <!-- 공통 폼 검증 에러 스타일 (.has-error, .field-error-message).
             JSON API 기반 폼(form-error.js 사용) 에서만 의미가 있지만, MVC 폼 페이지에도
             함께 로드해도 해당 클래스가 쓰이지 않으면 부작용이 없으므로 commonHead 에 포함. -->
        <link rel="stylesheet" th:href="@{/css/form-validation.css}">
        <!-- 테이블 공통 정렬 규칙 (.n-table 헤더 가운데, .n-td-center, .n-tbl-list) -->
        <link rel="stylesheet" th:href="@{/css/table-list.css}">
    </th:block>
</head>

<body>
<!--
  내비게이션 바 프래그먼트
  사용 예)
    th:replace="~{fragments/layout :: navbar('dashboard')}"
-->
<nav th:fragment="navbar(activePage)" class="n-nav">
    <a th:href="@{/pxe/v1/admin/dashboard}" class="n-nav-brand">Provision Portal</a>

    <a th:href="@{/pxe/v1/admin/dashboard}"
       class="n-nav-link"
       th:classappend="${activePage == 'dashboard'} ? ' active'">대시보드</a>

    <a th:href="@{/pxe/v1/admin/os}"
       class="n-nav-link"
       th:classappend="${activePage == 'os'} ? ' active'">OS 관리</a>

    <a th:href="@{/pxe/v1/setting}"
       class="n-nav-link"
       th:classappend="${activePage == 'setting'} ? ' active'">세팅 주문서</a>

    <a th:href="@{/pxe/v1/order}"
       class="n-nav-link"
       th:classappend="${activePage == 'order'} ? ' active'">작업 주문</a>
</nav>
</body>

</html>
