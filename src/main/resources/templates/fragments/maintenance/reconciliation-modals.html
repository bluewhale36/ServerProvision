<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  R9-3 — Reconciliation 전용 확인 modal 묶음.
  ─────────────────────────────────────────────────────────
  · applyModalCard / dismissModalCard : /ui/confirm-modal/DRIFT_APPLY | DRIFT_DISMISS 의
    lazy-load 응답 (ConfirmModalType 확장). 문구는 list.js 가 form 의 data-resource-label /
    data-resource-extra (R9-2 가 DriftKind 라벨·권장 조치로 채움) 에서 inject.
  · genericConfirmModal(prefix) : Deep 스캔 / 마커 서명 재발급 같은 페이지 액션용 정적 modal.
    drift 항목이 아니라 (resourceType, resourceId) 가 없으므로 lazy endpoint 대신
    ConfirmModal.open(prefix, opts) — title / message / 버튼을 호출 시점에 주입한다.
  스타일은 confirm-modal.css 의 .cm-* 재사용. 인라인 style 0.
*/-->

<div th:fragment="applyModalCard" class="cm-overlay" data-modal-active>
    <div class="cm-backdrop" data-modal-cancel></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 class="cm-title">드리프트 적용</h2>
            <p class="cm-message" data-modal-message>이 드리프트를 적용할까요?</p>
            <div class="cm-actions">
                <button type="button" class="n-btn n-btn-secondary" data-modal-cancel>취소</button>
                <button type="button" class="n-btn n-btn-primary" data-modal-confirm>적용</button>
            </div>
        </div>
    </div>
</div>

<div th:fragment="dismissModalCard" class="cm-overlay" data-modal-active>
    <div class="cm-backdrop" data-modal-cancel></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 class="cm-title">보고 닫기</h2>
            <p class="cm-message" data-modal-message>이 드리프트 보고를 닫을까요?</p>
            <div class="cm-actions">
                <button type="button" class="n-btn n-btn-secondary" data-modal-cancel>취소</button>
                <button type="button" class="n-btn n-btn-primary" data-modal-confirm>보고 닫기</button>
            </div>
        </div>
    </div>
</div>

<div th:fragment="genericConfirmModal(prefix)"
     th:id="${prefix} + 'Modal'"
     class="cm-overlay"
     hidden>
    <div th:id="${prefix} + 'Backdrop'" class="cm-backdrop"></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 th:id="${prefix} + 'Title'" class="cm-title">확인</h2>
            <p th:id="${prefix} + 'Message'" class="cm-message">계속할까요?</p>
            <div class="cm-actions">
                <button type="button" th:id="${prefix} + 'CancelBtn'"
                        class="n-btn n-btn-secondary">취소
                </button>
                <button type="button" th:id="${prefix} + 'ConfirmBtn'"
                        class="n-btn n-btn-primary">확인
                </button>
            </div>
        </div>
    </div>
</div>

<!--/*
  HF4-5 — 자원 중복 해소 택일 modal. 표준 id 규약(prefix=dupResolve)이라 ConfirmModal.open 을 그대로
  재사용하고, radio 슬롯만 고유 마크업 (restore fragment 의 .cm-cascade-option 클래스 세트 재사용 — 신규 CSS 0).
  경로 텍스트는 list.js 가 form 의 data-original-path / data-duplicate-path 에서 주입하며,
  열릴 때마다 기본 선택을 원본(DB 기록 경로)으로 리셋한다 (사용자 결정 ③).
*/-->
<div th:fragment="duplicateResolveModal" id="dupResolveModal" class="cm-overlay" hidden>
    <div id="dupResolveBackdrop" class="cm-backdrop"></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 id="dupResolveTitle" class="cm-title">자원 중복 해소</h2>
            <p id="dupResolveMessage" class="cm-message cm-message-tight">남길 위치를 선택하세요 — 선택하지 않은 쪽 파일은 삭제됩니다.</p>
            <div class="cm-cascade-wrap">
                <label class="cm-cascade-option">
                    <input type="radio" name="dupResolveSurvivor" value="ORIGINAL" checked>
                    <span>
                        <span class="cm-cascade-option-title">원본 유지 (DB 기록 경로)</span>
                        <span class="cm-cascade-option-desc"><code id="dupResolveOriginalPath"></code></span>
                        <span class="cm-cascade-option-desc">복제본 파일을 삭제합니다. 등록 정보(DB)는 그대로 둡니다.</span>
                    </span>
                </label>
                <label class="cm-cascade-option">
                    <input type="radio" name="dupResolveSurvivor" value="DUPLICATE">
                    <span>
                        <span class="cm-cascade-option-title">복제본 유지</span>
                        <span class="cm-cascade-option-desc"><code id="dupResolveDuplicatePath"></code></span>
                        <span class="cm-cascade-option-desc">원본 파일을 삭제하고 등록 경로(DB)를 복제본 위치로 갱신합니다.</span>
                    </span>
                </label>
            </div>
            <div class="cm-actions">
                <button type="button" id="dupResolveCancelBtn" class="n-btn n-btn-secondary">취소</button>
                <button type="button" id="dupResolveConfirmBtn" class="n-btn n-btn-outline-danger">선택 적용</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
