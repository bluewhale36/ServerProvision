<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  HF4-1 — 휴지통 보존기간 연장 확인 modal fragment (confirm-deprecate 패턴).
  호출측은 form 에 data-confirm-extend + data-resource-label + data-extend-step-days 만 주면 끝.
  lazy-load 전용 — /ui/confirm-modal/EXTEND_TTL 이 modalCard 를 응답, 메시지는 JS 가 inject.
  스타일은 /css/confirm-modal.css 의 .cm-* 클래스 사용.
*/-->
<div th:fragment="modalCard" class="cm-overlay" data-modal-active>
    <div class="cm-backdrop" data-modal-cancel></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 class="cm-title">보존기간 연장</h2>
            <p class="cm-message" data-modal-message>이 자원의 보존기간을 연장할까요?</p>
            <div class="cm-actions">
                <button type="button" class="n-btn n-btn-secondary" data-modal-cancel>취소</button>
                <button type="button" class="n-btn n-btn-primary" data-modal-confirm>연장</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
