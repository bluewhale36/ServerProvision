<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  Subprogram 한 kind 의 Miller 3 컬럼 fragment.
  파라미터:
    - groups          : List<BoardWithSubprogramListResponse> (첫 행은 공용 분류)
    - kindToken       : "driver" | "utility"
    - kindDisplayName : "드라이버" | "유틸리티"
    - millerId        : DOM root 의 id (driver / utility 두 곳에서 충돌 회피)
    - selectId        : (선택) 초기 선택할 자원 id
    - selectKey       : (선택, S5-4) 초기 선택할 scope key ('common' 또는 boardId)
  Miller C2 의 "+ 등록" 버튼은 분류 행마다 자체 boardScope 를 쿼리로 동봉한다 (폼 prefill 용).
*/-->
<div th:fragment="kindMiller(groups, kindToken, kindDisplayName, millerId, selectId, selectKey)"
     class="n-miller n-subprogram-miller"
     th:id="${millerId}"
     th:attr="data-kind=${kindToken}"
     th:data-initial-select-id="${selectId}"
     th:data-initial-select-key="${selectKey}">

    <div class="n-miller-col n-miller-col-names">
        <!-- S5-5 — 헤더를 '메인보드 모델' 로 통일. C1 의 실제 의미는 board scope. -->
        <div class="n-miller-col-header">메인보드 모델</div>

        <button th:each="group : ${groups}"
                type="button"
                class="n-miller-item n-miller-item-split"
                th:classappend="${group.isDeleted} ? 'n-miller-item-disabled' : ''"
                th:data-os-key="${group.commonScope ? 'common' : group.boardId}">
            <span class="n-miller-version-label">
                <span th:if="${group.commonScope}">공용</span>
                <th:block th:unless="${group.commonScope}">
                    <span th:text="${group.modelName}">X11SCA</span>
                    <span style="font-size: 11px; color: var(--n-text-muted);"
                          th:text="' · ' + ${group.vendorDisplayName}"> · Supermicro</span>
                </th:block>
                <span th:if="${group.deleted}" style="font-size: 11px; color: var(--n-text-muted);">(삭제됨)</span>
            </span>
        </button>
    </div>

    <div class="n-miller-col n-miller-col-versions">
        <!-- S5-5 — 헤더를 kindDisplayName ('드라이버' / '유틸리티') 로 통일. -->
        <div class="n-miller-col-header" th:text="${kindDisplayName}">버전</div>
        <div th:each="group : ${groups}"
             class="n-miller-version-panel"
             th:data-os-key="${group.commonScope ? 'common' : group.boardId}">

            <div th:if="${#lists.isEmpty(group.items)}"
                 class="n-empty-desc" style="padding: 10px 12px;">
                등록된 항목이 없습니다.
            </div>

            <button th:each="sp : ${group.items}"
                    type="button"
                    class="n-miller-item n-miller-item-split"
                    th:classappend="${sp.deleted} ? 'n-miller-item-disabled' : ''"
                    th:data-os-id="${sp.id}">
                <span class="n-miller-version-label">
                    <span th:text="${sp.name + ' · ' + sp.version}">name · 1.0</span>
                    <span th:if="${sp.deprecated and !sp.deleted}"
                          class="n-deprecated-dot"
                          title="Deprecated"></span>
                    <span th:if="${sp.deleted}" style="font-size: 11px; color: var(--n-text-muted);">(삭제됨)</span>
                </span>
                <span th:unless="${sp.deleted}"
                      class="n-miller-status-tag"
                      th:classappend="${sp.enabled} ? 'n-miller-status-tag-on' : 'n-miller-status-tag-off'"
                      th:text="${sp.enabled} ? '활성화' : '비활성화'">활성화</span>
            </button>

            <div style="padding: 8px 12px;">
                <a th:href="@{/management/subprogram/new(kind=${kindToken == 'driver' ? 'DRIVER' : 'UTILITY'}, boardScope=${group.commonScope ? 'common' : group.boardId})}"
                   class="n-btn n-btn-sm n-btn-primary" style="width: 100%;"
                   th:text="'+ ' + ${kindDisplayName} + ' 등록'">+ 등록</a>
            </div>
        </div>
    </div>

    <div class="n-miller-col n-miller-col-detail">
        <!-- S5-5 — C3 안내 텍스트 2 상태. kindDisplayName ('드라이버' / '유틸리티') 로 메시지 합성. -->
        <div class="n-miller-empty"
             th:data-empty-before="|메인보드 모델을 선택하여 ${kindDisplayName} 보기|"
             th:data-empty-after="|${kindDisplayName}를 선택하여 상세 보기|"
             th:text="${selectId != null or selectKey != null} ? |${kindDisplayName}를 선택하여 상세 보기| : |메인보드 모델을 선택하여 ${kindDisplayName} 보기|">
            자원을 선택하여 상세 사항 보기
        </div>

        <th:block th:each="group : ${groups}">
            <div th:each="sp : ${group.items}"
                 class="n-miller-detail-panel"
                 th:data-os-id="${sp.id}">

                <dl class="n-accordion-fields">
                    <div class="n-accordion-field">
                        <dt>ID</dt>
                        <dd th:text="${sp.id}"></dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>분류</dt>
                        <dd>
                            <span th:if="${group.commonScope}">공용</span>
                            <span th:unless="${group.commonScope}"
                                  th:text="${group.vendorDisplayName + ' · ' + group.modelName}"></span>
                        </dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>이름</dt>
                        <dd>
                            <span th:text="${sp.name}"></span>
                            <span th:if="${sp.deprecated}"
                                  class="n-badge n-badge-yellow"
                                  style="margin-left: 8px;">Deprecated</span>
                        </dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>버전</dt>
                        <dd><code th:text="${sp.version}"></code></dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>트리 루트</dt>
                        <dd><code th:text="${sp.treeRootPath}"></code></dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>실행 대상</dt>
                        <dd>
                            <code th:if="${sp.entrypointRelativePath != null and !#strings.isEmpty(sp.entrypointRelativePath)}"
                                  th:text="${sp.entrypointRelativePath}"></code>
                            <span th:if="${sp.entrypointRelativePath == null or #strings.isEmpty(sp.entrypointRelativePath)}"
                                  style="color: var(--n-text-muted); font-size: 12px;">
                                미설정 — 수정에서 입력하세요.
                            </span>
                        </dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>manifest 해시</dt>
                        <dd><code style="font-size: 11px;" th:text="${sp.manifestHash}"></code></dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>번들 크기</dt>
                        <dd>
                            <span th:text="${sp.fileCount}">0</span> files /
                            <span th:text="${sp.totalBytes}">0</span> bytes
                        </dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>무결성</dt>
                        <dd>
                            <span class="n-badge"
                                  th:classappend="${T(com.example.serverprovision.management.common.view.IntegrityStatusView).badgeClass(sp.integrityStatus)}"
                                  th:data-subprogram-id="${sp.id}"
                                  th:data-verify-url="@{/management/subprogram/{id}/verify(id=${sp.id})}"
                                  th:data-status-url="@{/management/subprogram/{id}/integrity-status(id=${sp.id})}"
                                  th:text="${sp.integrityStatus != null ? sp.integrityStatus.name() : 'NOT_VERIFIED'}">NOT_VERIFIED</span>
                            <button type="button" class="n-btn n-btn-sm n-btn-ghost"
                                    th:data-verify-url="@{/management/subprogram/{id}/verify(id=${sp.id})}">
                                검증
                            </button>
                        </dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>설명</dt>
                        <dd th:text="${sp.description != null and !#strings.isEmpty(sp.description)} ? ${sp.description} : '—'"></dd>
                    </div>
                    <div class="n-accordion-field">
                        <dt>상태</dt>
                        <dd>
                            <span th:if="${sp.deleted}" class="n-badge n-badge-gray">삭제됨</span>
                            <th:block th:unless="${sp.deleted}">
                                <span class="n-badge"
                                      th:classappend="${sp.enabled} ? 'n-badge-green' : 'n-badge-orange'"
                                      th:text="${sp.enabled} ? '활성화' : '비활성화'"></span>
                                <!-- R2-2-1 — 활성화 방향이 부모 메인보드 상태(비활성/Deprecated/삭제)로 막히면 disabled + tooltip -->
                                <span th:if="${!sp.enabled and sp.parentBlocksEnable}" class="n-btn-tooltip-wrap"
                                      data-tooltip="부모 메인보드가 비활성 / Deprecated / 삭제 상태입니다. 부모를 먼저 정상화해주세요.">
                                    <button type="button" class="n-btn n-btn-sm n-btn-outline-success" disabled>활성화</button>
                                </span>
                                <form th:unless="${!sp.enabled and sp.parentBlocksEnable}"
                                      th:action="@{/management/subprogram/{id}/toggle(id=${sp.id})}"
                                      method="post" class="n-accordion-inline-form">
                                    <button type="submit"
                                            class="n-btn n-btn-sm"
                                            th:classappend="${sp.enabled} ? 'n-btn-outline-danger' : 'n-btn-outline-success'"
                                            th:text="${sp.enabled} ? '비활성화' : '활성화'"></button>
                                </form>
                            </th:block>
                        </dd>
                    </div>
                </dl>

                <div class="n-form-actions">
                    <th:block th:unless="${sp.deleted}">
                        <a th:href="@{/management/subprogram/{id}/edit(id=${sp.id})}"
                           class="n-btn n-btn-secondary">수정</a>
                        <!-- MK2 — Deprecated 토글. -->
                        <form th:unless="${sp.deprecated}"
                              th:action="@{/management/subprogram/{id}/deprecate(id=${sp.id})}"
                              method="post" style="display:inline;"
                              data-confirm-deprecate=""
                              th:data-resource-label="|${sp.kindDisplayName} '${sp.name}'|">
                            <button type="submit" class="n-btn n-btn-outline-warning">Deprecated 표시</button>
                        </form>
                        <!-- R2-2-1 — 부모 메인보드가 Deprecated/삭제면 undeprecate 차단 -->
                        <span th:if="${sp.deprecated and sp.parentBlocksUndeprecate}" class="n-btn-tooltip-wrap"
                              data-tooltip="부모 메인보드가 Deprecated / 삭제 상태입니다. 부모를 먼저 해제 / 복구해주세요.">
                            <button type="button" class="n-btn n-btn-outline-info" disabled>Deprecated 해제</button>
                        </span>
                        <form th:if="${sp.deprecated and !sp.parentBlocksUndeprecate}"
                              th:action="@{/management/subprogram/{id}/undeprecate(id=${sp.id})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="n-btn n-btn-outline-info">Deprecated 해제</button>
                        </form>
                        <form th:action="@{/management/subprogram/{id}/delete(id=${sp.id})}"
                              method="post" style="display:inline;"
                              data-confirm-soft-delete=""
                              th:data-resource-label="|${sp.kindDisplayName} '${sp.name}'|">
                            <button type="submit" class="n-btn n-btn-outline-danger">삭제</button>
                        </form>
                    </th:block>
                    <th:block th:if="${sp.deleted}">
                        <!-- R2-2-1 — 부모 메인보드가 삭제면 restore 차단 (부모부터 복구) -->
                        <span th:if="${sp.parentBlocksRestore}" class="n-btn-tooltip-wrap"
                              data-tooltip="부모 메인보드가 삭제 상태입니다. 부모부터 복구해주세요.">
                            <button type="button" class="n-btn n-btn-outline-info" disabled>복구</button>
                        </span>
                        <form th:unless="${sp.parentBlocksRestore}"
                              th:action="@{/management/subprogram/{id}/restore(id=${sp.id})}"
                              method="post" style="display:inline;"
                              data-confirm-restore=""
                              data-async-submit=""
                              th:data-resource-label="|${sp.kindDisplayName} '${sp.name}'|">
                            <button type="submit" class="n-btn n-btn-outline-info">복구</button>
                        </form>
                        <!-- S5-2-2 — 영구 삭제. S5-6-1 — typed-name expected 는 BE 가 modal trigger 시 응답. -->
                        <form th:action="@{/management/subprogram/{id}/purge(id=${sp.id})}"
                              method="post" style="display:inline;"
                              data-confirm-purge=""
                              data-resource-type="SUBPROGRAM"
                              th:data-resource-id="${sp.id}"
                              th:data-resource-label="|${sp.kindDisplayName} '${sp.name}'|"
                              data-resource-extra="디스크의 트리도 함께 제거돼요.">
                            <button type="submit" class="n-btn n-btn-danger">영구 삭제</button>
                        </form>
                    </th:block>
                </div>
            </div>
        </th:block>
    </div>
</div>
</body>
</html>
