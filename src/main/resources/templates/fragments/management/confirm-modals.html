<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  S5-2 — 4 종 자원 상태 변경 modal 묶음 + 공통 script 통합 include.
  ─────────────────────────────────────────────────────────────
  사용 :  <div th:replace="~{fragments/management/confirm-modals :: all}"></div>

  호출측은 1 줄로 4 fragment + 5 script 를 모두 include. 호출 form 에는 boolean 마커
  (data-confirm-soft-delete / -deprecate / -restore / -purge) + 자원 식별자만 주면 끝.
*/-->
<th:block th:fragment="all">
    <!-- 공통 modal 스타일 — 4 fragment 가 .cm-* class 로 참조 -->
    <link rel="stylesheet" th:href="@{/css/confirm-modal.css}">
    <div th:replace="~{fragments/management/confirm-soft-delete :: confirmSoftDeleteModal('confirmSoftDelete')}"></div>
    <div th:replace="~{fragments/management/confirm-deprecate :: confirmDeprecateModal('confirmDeprecate')}"></div>
    <div th:replace="~{fragments/management/confirm-restore :: confirmRestoreModal('confirmRestore')}"></div>
    <div th:replace="~{fragments/management/confirm-purge :: confirmPurgeModal('confirmPurge')}"></div>
    <script th:src="@{/management/common/confirm-modal-base.js}"></script>
    <script th:src="@{/management/common/confirm-soft-delete.js}"></script>
    <script th:src="@{/management/common/confirm-deprecate.js}"></script>
    <script th:src="@{/management/common/confirm-undeprecate.js}"></script>
    <script th:src="@{/management/common/confirm-restore.js}"></script>
    <script th:src="@{/management/common/confirm-purge.js}"></script>
</th:block>

<!--/*
  S5-6-1 — confirm-purge 의 사전 include 만 제외한 변형. soft-delete / deprecate / restore 는
  그대로 사전 렌더 (S5-6-2 에서 별도 lazy-load), purge 는 modalLazySlot placeholder 로 대체.
  S5-6-2 진입 후 lazyShell 로 대체 — backward-compat 으로만 유지.
*/-->
<th:block th:fragment="nonPurge">
    <link rel="stylesheet" th:href="@{/css/confirm-modal.css}">
    <div th:replace="~{fragments/management/confirm-soft-delete :: confirmSoftDeleteModal('confirmSoftDelete')}"></div>
    <div th:replace="~{fragments/management/confirm-deprecate :: confirmDeprecateModal('confirmDeprecate')}"></div>
    <div th:replace="~{fragments/management/confirm-restore :: confirmRestoreModal('confirmRestore')}"></div>
    <div id="modalLazySlot"></div>
    <script th:src="@{/management/common/confirm-modal-base.js}"></script>
    <script th:src="@{/management/common/confirm-soft-delete.js}"></script>
    <script th:src="@{/management/common/confirm-deprecate.js}"></script>
    <script th:src="@{/management/common/confirm-undeprecate.js}"></script>
    <script th:src="@{/management/common/confirm-restore.js}"></script>
    <script th:src="@{/management/common/confirm-purge.js}"></script>
</th:block>

<!--/*
  S5-6-2 — confirm-purge / soft-delete / deprecate / restore 모두 lazy-load. modal markup 은
  /ui/confirm-modal/{type} 가 응답. 본 fragment 는 단일 placeholder + 4 script + CSS 만 포함.
  delete-reject-modal 은 응답 흐름이 다른 별도 sub-slice 에서 다룸 (현재 호출측이 별도로 사전 include).
*/-->
<th:block th:fragment="lazyShell">
    <link rel="stylesheet" th:href="@{/css/confirm-modal.css}">
    <!-- modal markup 이 inject 될 placeholder. modal 1 개만 활성이므로 ID 공유 안전. -->
    <div id="modalLazySlot"></div>
    <script th:src="@{/management/common/confirm-modal-base.js}"></script>
    <script th:src="@{/management/common/confirm-soft-delete.js}"></script>
    <script th:src="@{/management/common/confirm-deprecate.js}"></script>
    <script th:src="@{/management/common/confirm-undeprecate.js}"></script>
    <script th:src="@{/management/common/confirm-restore.js}"></script>
    <script th:src="@{/management/common/confirm-purge.js}"></script>
</th:block>
</body>
</html>
