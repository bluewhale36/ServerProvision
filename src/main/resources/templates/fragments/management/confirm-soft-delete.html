<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  S5-2 — 자원 soft-delete 확인 modal fragment.
  ─────────────────────────────────────────────────────────
  호출측은 form 에 data-confirm-soft-delete + data-resource-label 만 주면 끝.
  파라미터 : prefix (default 'confirmSoftDelete')
  생성 element id : {prefix}Modal / Backdrop / Title / Message / ConfirmBtn / CancelBtn
  스타일은 /css/confirm-modal.css 의 .cm-* 클래스 사용 (인라인 style 0).
*/-->
<div th:fragment="confirmSoftDeleteModal(prefix)"
     th:id="${prefix} + 'Modal'"
     class="cm-overlay"
     hidden>
    <div th:id="${prefix} + 'Backdrop'" class="cm-backdrop"></div>
    <div class="n-card cm-card" role="dialog" aria-modal="true">
        <div class="n-card-body">
            <h2 th:id="${prefix} + 'Title'" class="cm-title">자원 삭제</h2>
            <p th:id="${prefix} + 'Message'" class="cm-message">메시지</p>
            <div class="cm-actions">
                <button type="button" th:id="${prefix} + 'CancelBtn'"
                        class="n-btn n-btn-secondary">취소</button>
                <button type="button" th:id="${prefix} + 'ConfirmBtn'"
                        class="n-btn n-btn-outline-danger">삭제</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
