<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  MK3-2 — softDelete reject modal fragment.
  ─────────────────────────────────────────────────────────
  사전조건 (Files.exists(DB.path)) 위반으로 409 + DeleteRejectResponse 응답 시
  본 modal 이 표시된다. 사용자 3택 — 위치 정정 후 삭제 (default · 권장) / 강제 정리 / 취소.

  파라미터:
    - prefix : modal element id 접두사 (페이지에 여러 modal 이 있을 때 충돌 회피).

  JS 흐름은 `delete-reject-modal.js` 가 처리. 기존 페이지의 삭제 form submit 을 가로채
  XHR 호출 → 409 응답이면 본 modal 표시 → 사용자 액션 → delete-intent endpoint 호출.

  생성되는 element id (prefix="deleteReject" 기준):
    deleteRejectModal · deleteRejectBackdrop · deleteRejectMissingPath ·
    deleteRejectGhostBadge · deleteRejectCorrectBtn · deleteRejectForcedBtn ·
    deleteRejectCancelBtn · deleteRejectCloseBtn · deleteRejectError

  CSS: 기존 .n-alert / .n-btn / .n-card 재사용. 신규 CSS 토큰 0.
*/-->
<div th:fragment="deleteRejectModal(prefix)"
     th:id="${prefix} + 'Modal'"
     hidden
     style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1050;
            display: flex; align-items: center; justify-content: center; padding: 24px;">

    <!-- backdrop -->
    <div th:id="${prefix} + 'Backdrop'"
         style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.45);"></div>

    <!-- card -->
    <div class="n-card" role="dialog" aria-modal="true"
         style="position: relative; max-width: 600px; width: 100%; max-height: 90vh;
                overflow-y: auto;">
        <div class="n-card-body">
            <h2 style="margin: 0 0 12px 0; font-size: 1.15rem; display: flex;
                       justify-content: space-between; align-items: baseline; gap: 12px;">
                <span>파일을 찾을 수 없습니다</span>
                <button type="button" th:id="${prefix} + 'CloseBtn'"
                        class="n-btn n-btn-sm n-btn-ghost" aria-label="닫기">×</button>
            </h2>

            <div class="n-alert n-alert-warning" style="margin-bottom: 12px;">
                시스템이 추적 중인 위치에 파일이 없습니다. 운영자가 외부에서 파일을 옮기셨거나
                삭제하셨을 수 있습니다. 다음 중 하나를 선택해주세요.
            </div>

            <div style="margin: 8px 0 12px 0;">
                <span style="color: var(--n-text-muted, #666); font-size: 0.85rem;">추적 위치:</span>
                <code th:id="${prefix} + 'MissingPath'"
                      style="display: block; word-break: break-all; padding: 6px 8px;
                             background: var(--n-bg-muted, #f5f5f5); border-radius: 4px;
                             margin-top: 4px; font-size: 0.85rem;"></code>
            </div>

            <div th:id="${prefix} + 'GhostBadge'" hidden style="margin: 8px 0 12px 0;">
                <span class="n-badge"
                      style="background: var(--n-color-danger, #c0392b); color: #fff;">
                    이미 ghost 상태
                </span>
                <span style="color: var(--n-text-muted, #666); font-size: 0.85rem; margin-left: 6px;">
                    DB row 만 남고 자원과 trash 모두 부재한 상태
                </span>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;">
                <button type="button" th:id="${prefix} + 'CorrectBtn'"
                        class="n-btn n-btn-primary" style="text-align: left; padding: 12px;">
                    <strong>위치 정정 후 삭제</strong> (권장)
                    <div style="font-size: 0.82rem; font-weight: normal; margin-top: 2px;
                                color: var(--n-text-muted, #666);">
                        파일을 다른 곳으로 옮기셨다면 이 옵션을 선택하세요.
                        시스템이 새 위치를 찾아 정정한 후 삭제합니다.
                    </div>
                </button>

                <button type="button" th:id="${prefix} + 'ForcedBtn'"
                        class="n-btn n-btn-outline-danger" style="text-align: left; padding: 12px;">
                    <strong>강제 정리</strong>
                    <div style="font-size: 0.82rem; font-weight: normal; margin-top: 2px;
                                color: var(--n-text-muted, #666);">
                        파일이 진짜로 사라졌다면 이 옵션을 선택하세요.
                        시스템 등록만 정리되고 디스크는 변경되지 않습니다.
                    </div>
                </button>

                <button type="button" th:id="${prefix} + 'CancelBtn'"
                        class="n-btn n-btn-secondary">취소</button>
            </div>

            <div th:id="${prefix} + 'Error'" hidden
                 class="n-alert n-alert-danger" style="margin-top: 12px;"></div>
        </div>
    </div>
</div>
</body>
</html>
