<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  서버 디렉토리 탐색 패널 fragment.
  ─────────────────────────────────────────────────────────────
  파라미터:
    - prefix             : element id 접두사. 동일 페이지에 여러 패널을 띄울 때 충돌 회피
                           ("browse" / "entrypointBrowse" 등). JS 가 prefix + suffix 로 element 를 잡는다.
    - mode               : "directory" — 임의 경로(주로 디렉토리)를 사용자에게 지정받음.
                                          "이 경로로 적용" 주요 액션 버튼 노출.
                           "file"      — 트리 루트 안의 파일을 진입점으로 선택. 파일 클릭이 곧 적용.
                                          "진입점 비우기" 보조 액션만 노출.
    - primaryActionLabel : (옵션, directory 모드 전용) primary 액션 버튼 라벨. null 또는 미지정 시
                           "이 경로로 적용" default. file 모드에서는 무시.
                           Thymeleaf 는 호출자가 생략한 fragment 파라미터를 null 로 바인딩하므로
                           기존 호출자 (`browsePanel('browse', 'directory')` 등) 는 변경 불필요.
  생성되는 element id (prefix="browse" 기준):
    browsePanel · browseUpBtn · browseCurrentPath · browseStatus · browseEntries
    browseCancelBtn · browseApplyBtn (directory 모드) · browseClearBtn (file 모드)
  ─────────────────────────────────────────────────────────────
*/-->
<div th:fragment="browsePanel(prefix, mode, primaryActionLabel)"
     th:id="${prefix} + 'Panel'"
     hidden
     style="margin-top: 10px; border: 1px solid var(--n-border); border-radius: 6px; padding: 12px; background: #fafafa;">

    <div style="display: flex; gap: 6px; align-items: center; margin-bottom: 8px;">
        <button type="button"
                th:id="${prefix} + 'UpBtn'"
                class="n-btn n-btn-sm n-btn-ghost"
                th:title="${mode == 'file' ? '상위 디렉토리로 (트리 루트 밖으로는 이동 불가)' : '상위 디렉토리로'}">↑ 상위
        </button>
        <code th:id="${prefix} + 'CurrentPath'"
              style="flex: 1; font-size: 12px; word-break: break-all;"></code>
    </div>

    <div th:id="${prefix} + 'Status'" class="n-hint" style="margin-bottom: 8px;"></div>

    <ul th:id="${prefix} + 'Entries'"
        style="list-style: none; padding: 0; margin: 0 0 8px 0; max-height: 240px; overflow-y: auto; border: 1px solid var(--n-border); border-radius: 4px; background: #fff;">
    </ul>

    <div style="display: flex; justify-content: flex-end; gap: 6px;">
        <button type="button"
                th:id="${prefix} + 'CancelBtn'"
                class="n-btn n-btn-sm n-btn-ghost">닫기
        </button>
        <button th:if="${mode == 'file'}"
                type="button"
                th:id="${prefix} + 'ClearBtn'"
                class="n-btn n-btn-sm n-btn-ghost">진입점 비우기
        </button>
        <button th:if="${mode == 'directory'}"
                type="button"
                th:id="${prefix} + 'ApplyBtn'"
                class="n-btn n-btn-sm n-btn-primary"
                th:text="${primaryActionLabel != null ? primaryActionLabel : '이 경로로 적용'}">이 경로로 적용
        </button>
    </div>
</div>
</body>
</html>
