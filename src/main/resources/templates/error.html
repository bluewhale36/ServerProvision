<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  공통 에러 뷰. WebExceptionHandler 가 Model 에 담은 status/statusLabel/message 를 렌더한다.
  Spring Boot 기본 에러 경로 /error 도 이 뷰로 연결된다 (templates/error.html 규약).
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('오류')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('os-image')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">요청을 처리할 수 없습니다</h1>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <div class="n-alert n-alert-danger" style="margin-bottom: 24px;">
                <div style="font-size: 16px; font-weight: 600;">
                    <span th:text="${status} ?: 500">500</span>
                    <span th:text="${statusLabel} ?: 'Internal Error'">Internal Error</span>
                </div>
                <div style="margin-top: 8px;"
                     th:text="${message} ?: '알 수 없는 오류가 발생했습니다.'">
                    메시지
                </div>
            </div>
            <div class="n-form-actions">
                <a href="javascript:history.back()" class="n-btn n-btn-secondary">← 이전 페이지로</a>
                <a th:href="@{/management/os}" class="n-btn n-btn-primary">홈으로</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
