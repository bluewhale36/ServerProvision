<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  MK3. 휴지통 (Trash) 페이지
  ─────────────────────────────────────────────────────────
  Model:
    trashItems     : List<TrashItemResponse>  — 5 도메인 합본
                       · resourceType : ResourceType
                       · resourceId   : Long
                       · displayName  : String
                       · originalPath : String
                       · trashedPath  : String
                       · trashedAt    : Instant
                       · expiresAt    : Instant   (trashedAt + TTL)
                       · ttlWarning   : boolean   (7일 이내)

  액션 :
    · 복원      → 기존 도메인 endpoint `/management/<domain>/{id}/restore` 재사용
    · 영구삭제   → 기존 도메인 endpoint `/management/<domain>/{id}/purge`   재사용 (S5-2-2 typed-name)
    · 보존기간 연장 → `/maintenance/trash/{resourceType}/{resourceId}/extend`

  CP2 — 페이지 더미 + 표 스켈레톤. 도메인별 endpoint 합성 + ttl 경고 색 + 빈 상태는 CP4 에서 정밀화.
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('휴지통')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/table-list.css}">
    <link rel="stylesheet" th:href="@{/maintenance/trash/trash-list.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('trash')}"></nav>

<div class="n-page">
    <div class="n-page-header">
        <h1 class="n-page-title">휴지통</h1>
        <div class="n-header-actions">
            <span class="n-hint" style="margin-right: 12px;">soft-delete 자원이 격리되며, 30일 후 자동 영구삭제됩니다. 자원별로 보존기간을 연장할 수 있습니다.</span>
            <!-- S5-2-4 — 운영 설정 / 감사 로그 페이지 진입점. S5-5 — 이모지 제거. -->
            <a th:href="@{/maintenance/trash/settings}"
               class="n-btn n-btn-secondary n-btn-sm"
               title="휴지통 운영 설정 (TTL · cron · 알림 채널 · retry 정책)">운영 설정</a>
            <a th:href="@{/maintenance/trash/purge-log}"
               class="n-btn n-btn-secondary n-btn-sm"
               title="영구삭제 감사 로그 — 자원별 시간순 이력">감사 로그</a>
        </div>
    </div>

    <!--/* 빈 상태 */-->
    <div th:if="${#lists.isEmpty(trashItems)}" class="n-empty-state">
        <div class="n-empty-title">휴지통이 비어있습니다.</div>
        <div class="n-hint">soft-delete 한 자원이 여기에 보관됩니다.</div>
    </div>

    <!--/* 자원 목록 */-->
    <table th:if="${not #lists.isEmpty(trashItems)}" class="n-table">
        <thead>
        <tr>
            <th>자원 종류</th>
            <th>자원 ID</th>
            <th>자원 이름</th>
            <th>원래 경로</th>
            <th>휴지통 이동 시각</th>
            <th>잔여 TTL</th>
            <th>액션</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${trashItems}"
            th:classappend="${item.ttlWarning} ? 'n-row-warning' : ''">
            <td>
                <span class="n-badge n-badge-gray" th:text="${item.resourceType}"></span>
                <!--/* MK3-1 — ghost 배지. DB-truth + FS-truth 양쪽이 음수인 dead row. */-->
                <span th:if="${item.ghost}" class="n-badge"
                      style="background: var(--n-color-danger, #c0392b); color: #fff; margin-left: 4px;"
                      title="DB row 만 남고 FS 자원도 trash 도 없는 상태 — 복구 불가. 정리 액션으로 row 제거.">복구 불가</span>
            </td>
            <td th:text="${item.resourceId}"></td>
            <td>
                <!--/* S5-2-3-1 — 자식 자원은 들여쓰기 + ↳ + 부모 표시. 부모 활성/삭제 상태 배지 동반. */-->
                <div th:if="${item.parentResourceId != null}" class="trash-parent-line">
                    <span class="trash-parent-arrow">↳</span>
                    <span class="trash-parent-label">
                        <span th:text="${item.parentResourceType}"
                              class="n-badge n-badge-gray trash-parent-badge"></span>
                        <code style="font-size: 11px;" th:text="${item.parentDisplayName}"></code>
                        <span th:if="${item.parentDeleted}" class="n-badge trash-parent-deleted"
                              title="부모 자원이 삭제 상태입니다. 자식만 단독 복구할 수 없으니 부모부터 복구해주세요.">부모 삭제 상태</span>
                    </span>
                </div>
                <code th:class="${item.parentResourceId != null} ? 'trash-child-name' : ''"
                      style="font-size: 12px;" th:text="${item.displayName}"></code>
            </td>
            <td>
                <code style="font-size: 11px; word-break: break-all;" th:text="${item.originalPath}"></code>
            </td>
            <td>
                <span th:if="${item.trashedAt != null}"
                      th:text="${#temporals.format(item.trashedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                <span th:if="${item.trashedAt == null}" style="color: var(--n-text-muted, #777);">—</span>
            </td>
            <td>
                <span th:if="${item.expiresAt != null}"
                      th:text="${#temporals.format(item.expiresAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                <span th:if="${item.expiresAt == null}" style="color: var(--n-text-muted, #777);">—</span>
                <strong th:if="${item.ttlWarning}" style="color: var(--n-color-danger); margin-left: 6px;">곧
                    영구삭제</strong>
            </td>
            <td style="vertical-align: middle; text-align: right;">
                <div style="display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
                    <!--/* MK3-1 — ghost 행은 "정리" 액션 1개만. 복원/연장/영구삭제 disabled. */-->
                    <!-- ghost row 정리는 DB row 만 제거 (복구 가능 자원 없음). typed-name 불요 — 단순 soft-delete 마커 유지. -->
                    <form th:if="${item.ghost}"
                          th:action="@{/maintenance/trash/{rt}/{rid}/clear-ghost(rt=${item.resourceType}, rid=${item.resourceId})}"
                          method="post"
                          data-confirm-soft-delete=""
                          data-async-submit=""
                          th:data-resource-label="|${item.resourceType} #${item.resourceId} (ghost row)|"
                          data-resource-extra="복구 가능한 자원이 없으므로 안전한 작업이에요.">
                        <button type="submit" class="n-btn n-btn-sm n-btn-outline-danger">정리</button>
                    </form>

                    <!--/* 정상 trash 자원 — 기존 3 액션 그대로. 부모 메타 자원 (OS_IMAGE/BOARD_MODEL) 은 cascade 라디오 노출. */-->
                    <th:block th:unless="${item.ghost}">
                        <form th:action="@{/maintenance/trash/{rt}/{rid}/restore(rt=${item.resourceType}, rid=${item.resourceId})}"
                              method="post"
                              data-confirm-restore=""
                              data-async-submit=""
                              th:data-resource-label="${item.displayName}"
                              data-resource-extra="원래 경로로 복원돼요."
                              th:attr="data-cascade-true-title=${item.childPreview != null ? '하위 자원도 함께 복구' : null},
                                   data-cascade-true-desc=${item.childPreview}">
                            <!-- S5-3-2 — parentDeleted 시 disabled + wrapper tooltip 으로 안내. -->
                            <!--    테이블 오른쪽 끝 액션 컬럼이라 tooltip 잘림 방지 위해 우측 정렬. -->
                            <span class="n-btn-tooltip-wrap"
                                  data-tooltip-align="right"
                                  th:attr="data-tooltip=${item.parentDeleted} ? '부모 자원이 삭제 상태라 자식 단독 복구가 불가능해요. 부모부터 복구해주세요.' : null">
                            <button type="submit" class="n-btn n-btn-sm n-btn-primary"
                                    th:disabled="${item.parentDeleted}">복원</button>
                        </span>
                        </form>
                        <form th:action="@{/maintenance/trash/{rt}/{rid}/extend(rt=${item.resourceType}, rid=${item.resourceId})}"
                              method="post"
                              data-confirm-deprecate=""
                              data-async-submit=""
                              th:data-resource-label="|${item.displayName} 의 보존기간|"
                              data-resource-extra="+30일 연장돼요.">
                            <button type="submit" class="n-btn n-btn-sm n-btn-ghost">+30일 연장</button>
                        </form>
                        <!-- S5-2 — typed-name 검증 적용 영구삭제. S5-6-1 — typed-name expected 는 BE 가 modal trigger 시 응답. -->
                        <form th:action="@{/maintenance/trash/{rt}/{rid}/purge(rt=${item.resourceType}, rid=${item.resourceId})}"
                              method="post"
                              data-confirm-purge=""
                              data-async-submit=""
                              th:data-resource-type="${item.resourceType}"
                              th:data-resource-id="${item.resourceId}"
                              th:data-resource-label="${item.displayName}"
                              data-resource-extra="휴지통에서 제거되며 복구 불가능해요.">
                            <button type="submit" class="n-btn n-btn-sm n-btn-outline-danger">영구삭제</button>
                        </form>
                    </th:block>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- S5-2 — 4 종 자원 상태 변경 modal 묶음 + 공통 script 통합. -->
<!-- S5-6-1 — confirm-purge 만 lazy-load. -->
<div th:replace="~{fragments/management/confirm-modals :: lazyShell}"></div>

<!-- S5-6-3 — 휴지통 결과 안내 modal 도 lazy-load. trash-result-modal :: modal 사전 include 제거. -->
<script th:src="@{/maintenance/trash/trash-action.js}"></script>

</body>
</html>
