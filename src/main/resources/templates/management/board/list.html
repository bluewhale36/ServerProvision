<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A2. 메인보드 모델 관리 목록 페이지 (Miller Columns)
  ─────────────────────────────────────────────────────────
  Model:
    boardGroups   : List<VendorGroupResponse>    C1/C2 데이터 소스
                      · vendor        : Vendor enum
                      · displayName   : String ("Gigabyte" 등)
                      · items         : List<BoardModelResponse> (C3 상세 포함)
    selectId      : Long (nullable)              토글/편집 후 초기 선택 복원
    includeDeleted: boolean                      휴지통 모드 여부

  CSS: A1 의 miller.css 재사용. 클래스 이름(n-miller-col-names/versions)은
       원래 OS 용이지만 레이아웃만 동일하게 쓴다. 도메인 의미는 data-* 속성으로 구분.
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('메인보드 모델 관리')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/miller.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('board')}"></nav>

<div class="n-page">
    <div class="n-page-header">
        <h1 class="n-page-title">메인보드 모델 관리</h1>
        <div class="n-header-actions">
            <!-- S5-4 — 토글 시 selectId 등 다른 querystring 보존. -->
            <label class="n-checkbox">
                <input type="checkbox"
                       th:checked="${includeDeleted}"
                       data-include-deleted-toggle>
                삭제된 항목 포함
            </label>
            <a th:href="@{/management/board/new}"
               class="n-btn n-btn-primary">+ 신규 메인보드 모델 등록</a>
        </div>
    </div>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(boardGroups)}" class="n-card">
        <div class="n-empty">
            <div class="n-empty-title"
                 th:text="${includeDeleted} ? '등록된 메인보드 모델이 없습니다 (휴지통 포함).' : '등록된 메인보드 모델이 없습니다.'">등록된 메인보드 모델이 없습니다.
            </div>
            <div class="n-empty-desc">"신규 모델 등록" 버튼으로 메인보드 모델을 추가하세요.</div>
        </div>
    </div>

    <!-- Miller 3컬럼 : C1 Vendor → C2 모델 → C3 상세 -->
    <div th:unless="${#lists.isEmpty(boardGroups)}"
         class="n-miller"
         th:data-initial-select-id="${selectId}"
         th:data-initial-select-key="${selectKey}">

        <!-- C1 : Vendor 그룹 -->
        <div class="n-miller-col n-miller-col-names">
            <div class="n-miller-col-header">제조사</div>
            <button th:each="group : ${boardGroups}"
                    type="button"
                    class="n-miller-item"
                    th:data-os-key="${group.vendor.name()}"
                    th:text="${group.displayName}">Gigabyte
            </button>
        </div>

        <!-- C2 : 해당 Vendor 의 모델 목록 -->
        <div class="n-miller-col n-miller-col-versions">
            <div class="n-miller-col-header">모델</div>
            <div th:each="group : ${boardGroups}"
                 class="n-miller-version-panel"
                 th:data-os-key="${group.vendor.name()}">
                <button th:each="board : ${group.items}"
                        type="button"
                        class="n-miller-item n-miller-item-split"
                        th:classappend="${board.isDeleted} ? 'n-miller-item-disabled' : ''"
                        th:data-os-id="${board.id}">
                    <span class="n-miller-version-label">
                        <span th:text="${board.modelName}">MS03-CE0-000</span>
                        <span th:if="${board.isDeprecated and !board.isDeleted}"
                              class="n-deprecated-dot"
                              title="Deprecated"></span>
                        <span th:if="${board.isDeleted}"
                              style="font-size: 11px; color: var(--n-text-muted);">(삭제됨)</span>
                    </span>
                    <span th:unless="${board.isDeleted}"
                          class="n-miller-status-tag"
                          th:classappend="${board.isEnabled} ? 'n-miller-status-tag-on' : 'n-miller-status-tag-off'"
                          th:text="${board.isEnabled} ? '활성화' : '비활성화'">활성화</span>
                </button>
                <!-- S5-5 — C2 내부 + 등록 버튼. -->
                <div style="padding: 8px 12px;">
                    <a th:href="@{/management/board/new}"
                       class="n-btn n-btn-sm n-btn-primary" style="width: 100%;">+ 메인보드 모델 등록</a>
                </div>
            </div>
        </div>

        <!-- C3 : 선택된 BoardModel 상세 -->
        <div class="n-miller-col n-miller-col-detail">
            <!-- S5-5 — C3 안내 텍스트 2 상태. -->
            <div class="n-miller-empty" id="millerEmpty"
                 data-empty-before="제조사를 선택하여 모델 보기"
                 data-empty-after="모델을 선택하여 상세 보기"
                 th:text="${selectKey != null or selectId != null} ? '모델을 선택하여 상세 보기' : '제조사를 선택하여 모델 보기'">제조사를 선택하여 모델
                보기
            </div>

            <th:block th:each="group : ${boardGroups}">
                <div th:each="board : ${group.items}"
                     class="n-miller-detail-panel"
                     th:data-os-id="${board.id}">

                    <!-- 기본 정보 테이블 -->
                    <table class="n-detail-table">
                        <tbody>
                        <tr>
                            <th>ID</th>
                            <td th:text="${board.id}"></td>
                        </tr>
                        <tr>
                            <th>제조사</th>
                            <td style="font-weight:600;" th:text="${group.displayName}"></td>
                        </tr>
                        <tr>
                            <th>모델명</th>
                            <td>
                                <span th:text="${board.modelName}"></span>
                                <span th:if="${board.isDeprecated}"
                                      class="n-badge n-badge-yellow"
                                      style="margin-left: 8px;">Deprecated</span>
                            </td>
                        </tr>
                        <tr>
                            <th>설명</th>
                            <td th:text="${board.description != null and !#strings.isEmpty(board.description)} ? ${board.description} : '—'"></td>
                        </tr>
                        <tr>
                            <th>호환 자원</th>
                            <td>
                                <span th:text="'BIOS ' + ${board.biosCount} + '건 · BMC ' + ${board.bmcCount} + '건'">BIOS 0건 · BMC 0건</span>
                            </td>
                        </tr>
                        <tr>
                            <th>상태</th>
                            <td>
                                <span th:if="${board.isDeleted}" class="n-badge n-badge-gray">삭제됨</span>
                                <th:block th:unless="${board.isDeleted}">
                                    <span class="n-badge"
                                          th:classappend="${board.isEnabled} ? 'n-badge-green' : 'n-badge-orange'"
                                          th:text="${board.isEnabled} ? '활성화' : '비활성화'"></span>
                                    <form th:action="@{/management/board/{id}/toggle(id=${board.id})}"
                                          method="post" style="display:inline; margin-left: 10px;">
                                        <button type="submit"
                                                class="n-btn n-btn-sm"
                                                th:classappend="${board.isEnabled} ? 'n-btn-outline-danger' : 'n-btn-outline-success'"
                                                th:text="${board.isEnabled} ? '비활성화' : '활성화'"></button>
                                    </form>
                                </th:block>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 수정/삭제/복구 : 우측 정렬 -->
                    <div class="n-form-actions">
                        <th:block th:unless="${board.isDeleted}">
                            <a th:href="@{/management/board/{id}/edit(id=${board.id})}"
                               class="n-btn n-btn-secondary">수정</a>
                            <!-- MK2 — Deprecated 토글. -->
                            <form th:unless="${board.isDeprecated}"
                                  th:action="@{/management/board/{id}/deprecate(id=${board.id})}"
                                  method="post" style="display:inline;"
                                  data-confirm-deprecate=""
                                  th:data-resource-label="|메인보드 모델 '${board.vendor.displayName} ${board.modelName}'|"
                                  th:data-resource-extra="|하위 BIOS · BMC · 드라이버·유틸리티 도 함께 Deprecated 표시돼요.|">
                                <button type="submit" class="n-btn n-btn-outline-warning">Deprecated 표시</button>
                            </form>
                            <form th:if="${board.isDeprecated}"
                                  th:action="@{/management/board/{id}/undeprecate(id=${board.id})}"
                                  method="post" style="display:inline;">
                                <button type="submit" class="n-btn n-btn-outline-info">Deprecated 해제</button>
                            </form>
                            <form th:action="@{/management/board/{id}/delete(id=${board.id})}"
                                  method="post" style="display:inline;"
                                  data-confirm-soft-delete=""
                                  th:data-resource-label="|메인보드 모델 '${board.vendor.displayName} ${board.modelName}'|"
                                  th:data-resource-extra="|하위 BIOS ${board.biosCount} · BMC ${board.bmcCount} · 드라이버·유틸리티 ${board.subprogramCount} 도 함께 삭제돼요.|">
                                <button type="submit" class="n-btn n-btn-outline-danger">삭제</button>
                            </form>
                        </th:block>
                        <th:block th:if="${board.isDeleted}">
                            <form th:action="@{/management/board/{id}/restore(id=${board.id})}"
                                  method="post" style="display:inline;"
                                  data-confirm-restore=""
                                  th:data-resource-label="|메인보드 모델 '${board.vendor.displayName} ${board.modelName}'|"
                                  data-cascade-true-title="하위 BIOS / BMC / 드라이버·유틸리티 도 함께 복구"
                                  data-cascade-true-desc="이 보드에 종속된 휴지통의 BIOS / BMC / 드라이버·유틸리티 자원을 일괄 복구해요.">
                                <button type="submit" class="n-btn n-btn-outline-info">복구</button>
                            </form>
                            <!-- S5-2-2 — 영구 삭제. S5-6-1 — typed-name expected 는 BE 가 modal trigger 시 응답. -->
                            <form th:action="@{/management/board/{id}/purge(id=${board.id})}"
                                  method="post" style="display:inline;"
                                  data-confirm-purge=""
                                  data-resource-type="BOARD_MODEL"
                                  th:data-resource-id="${board.id}"
                                  th:data-resource-label="|메인보드 모델 '${board.vendor.displayName} ${board.modelName}'|">
                                <button type="submit" class="n-btn n-btn-danger">영구 삭제</button>
                            </form>
                        </th:block>
                    </div>

                    <!-- 구분선 -->
                    <hr style="border: 0; border-top: 1px solid var(--n-border); margin: 28px 0;">

                    <h3 class="n-label strong" style="margin-bottom: 8px;">호환 BIOS · BMC · Driver</h3>
                    <div class="n-empty" style="padding: 16px;">
                        <div class="n-empty-desc" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                            <a th:href="@{/management/bios/{boardId}/new(boardId=${board.id})}"
                               class="n-btn n-btn-sm n-btn-secondary">BIOS 등록</a>
                            <a th:href="@{/management/bmc/{boardId}/new(boardId=${board.id})}"
                               class="n-btn n-btn-sm n-btn-secondary">BMC 등록</a>
                            <span>
                                현재 연결: <strong th:text="${board.biosCount}">0</strong> BIOS,
                                <strong th:text="${board.bmcCount}">0</strong> BMC,
                                <strong th:text="${board.subprogramCount}">0</strong> 드라이버·유틸리티
                            </span>
                        </div>
                    </div>

                </div>
            </th:block>
        </div>
    </div>
</div>

<!-- S5-2 — 4 종 자원 상태 변경 modal 묶음 + 공통 script 통합. -->
<!-- S5-6-1 — confirm-purge 만 lazy-load. -->
<div th:replace="~{fragments/management/confirm-modals :: lazyShell}"></div>

<!-- S5-4 — '삭제된 항목 포함' 토글 시 selectId 등 querystring 보존. -->
<script th:src="@{/global/include-deleted-toggle.js}"></script>
<!-- Miller 컬럼 상호작용 스크립트 : A1 의 os-list.js 를 그대로 재사용. -->
<script th:src="@{/management/os/os-list.js}"></script>

</body>
</html>
