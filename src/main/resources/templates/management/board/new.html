<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A2. 메인보드 모델 신규 등록 폼
  ─────────────────────────────────────────────────────────
  Model:
    boardModelForm : BoardModelCreateRequest    @ModelAttribute (vendor, model, description)
    vendorOptions  : List<Vendor>                모든 Vendor 열거형 값
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('신규 메인보드 모델 등록')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('board')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">신규 메인보드 모델 등록</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/board}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form id="boardModelForm"
                  th:action="@{/management/board}"
                  th:object="${boardModelForm}"
                  method="post"
                  novalidate>

                <!-- S4 폼 배너 슬롯 — JSON XHR 폼이 아닌 SSR 폼에서는 사용되지 않지만, 마크업 일관성을 위해 자리만 둔다. -->
                <div class="n-form-banner n-alert n-alert-danger" role="alert" hidden></div>

                <!-- 제조사 : 신규 등록 시에만 선택 가능 (수정 시 고정) -->
                <div class="n-form-group">
                    <label class="n-label strong" for="vendor">제조사</label>
                    <select id="vendor" th:field="*{vendor}" class="n-select"
                            data-error-field="vendor"
                            th:classappend="${#fields.hasErrors('vendor')} ? 'is-invalid'">
                        <option value="">선택하세요</option>
                        <option th:each="v : ${vendorOptions}"
                                th:value="${v.name()}"
                                th:text="${v.displayName}"></option>
                    </select>
                    <div class="n-hint">새 제조사를 추가하려면 <code>Vendor</code> 열거형에 상수를 추가해야 합니다.</div>
                    <div class="n-error" th:if="${#fields.hasErrors('vendor')}"
                         th:errors="*{vendor}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label strong" for="modelName">모델명</label>
                    <input id="modelName" type="text" th:field="*{modelName}"
                           class="n-input"
                           data-error-field="modelName"
                           th:classappend="${#fields.hasErrors('modelName')} ? 'is-invalid'"
                           placeholder="예: MS03-CE0-000">
                    <div class="n-hint">일부 제조사는 서버 모델명을 기준으로 기재할 수 있습니다.</div>
                    <div class="n-error" th:if="${#fields.hasErrors('modelName')}"
                         th:errors="*{modelName}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"
                              data-error-field="description"
                              placeholder="예: AM5 소켓, DDR5 지원 메인스트림 보드"></textarea>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/board}" class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">등록</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MK2 WAVE 1 — nudge modal (메타 단독 충돌용). -->
<div th:replace="~{fragments/management/nudge-modal :: nudgeModal('nudge', '/management/board/nudge')}"></div>

<script th:src="@{/global/form-error.js}"></script>
<script th:src="@{/global/nudge-modal.js}"></script>
<script th:src="@{/management/board/board-new.js}"></script>
</body>
</html>
