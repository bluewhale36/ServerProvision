<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A2. 메인보드 모델 수정 폼
  ─────────────────────────────────────────────────────────
  Model:
    boardModelForm : BoardModelUpdateRequest   @ModelAttribute (model, description)
    boardModelId   : Long                       경로 파라미터
    vendorLabel    : String                     화면 표시용 ("Gigabyte" 등, 수정 불가)
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('메인보드 모델 수정')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('board')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">메인보드 모델 수정</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/board(selectId=${boardModelId})}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form th:action="@{/management/board/{id}/edit(id=${boardModelId})}"
                  th:object="${boardModelForm}"
                  method="post"
                  novalidate>

                <!-- 제조사 : 수정 불가. 바꿀 땐 삭제 후 재등록 -->
                <div class="n-form-group">
                    <label class="n-label strong">제조사</label>
                    <input type="text" class="n-input" th:value="${vendorLabel}" readonly>
                    <div class="n-hint">제조사는 변경할 수 없습니다. 바꾸려면 삭제 후 재등록하세요.</div>
                </div>

                <div class="n-form-group">
                    <label class="n-label strong" for="modelName">모델명</label>
                    <input id="modelName" type="text" th:field="*{modelName}"
                           class="n-input"
                           th:classappend="${#fields.hasErrors('modelName')} ? 'is-invalid'"
                           placeholder="예: MS03-CE0-000">
                    <div class="n-error" th:if="${#fields.hasErrors('modelName')}"
                         th:errors="*{modelName}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"></textarea>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/board(selectId=${boardModelId})}"
                       class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
