<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('Subprogram (Driver / Utility) 관리')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/miller.css}">
    <link rel="stylesheet" th:href="@{/css/accordion.css}">
    <style>
        .n-subprogram-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        /*
         * Bootstrap 5 가 h2 를 2rem (32px) 으로 키우므로 .n-page-title (26px) 보다
         * 커 보이는 문제가 발생. 섹션 제목은 페이지 제목보다 작게 명시적으로 잡는다.
         */
        .n-subprogram-section-title {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            line-height: 1.3;
            color: var(--n-text);
        }
        .n-subprogram-section-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('subprogram')}"></nav>

<div class="n-page">
    <div class="n-page-header">
        <h1 class="n-page-title">Subprogram (Driver · Utility)</h1>
    </div>

    <section class="n-subprogram-section">
        <div class="n-subprogram-section-header">
            <h2 class="n-subprogram-section-title">Driver</h2>
            <div class="n-subprogram-section-actions">
                <!-- S5-5 — 체크박스를 외부 + 등록 버튼의 왼편으로 swap. -->
                <!-- S5-4 — 토글 시 selectKind / selectId 등 다른 querystring 보존. -->
                <label class="n-checkbox">
                    <input type="checkbox"
                           th:checked="${includeDeleted}"
                           data-include-deleted-toggle>
                    삭제된 항목 포함
                </label>
                <a th:href="@{/management/subprogram/new(kind='DRIVER')}" class="n-btn n-btn-primary">+ 신규 드라이버 등록</a>
            </div>
        </div>
        <div th:replace="~{fragments/management/subprogram/miller :: kindMiller(${driverGroups}, 'driver', '드라이버', 'driverMiller', ${selectKind != null and selectKind.name() == 'DRIVER' ? selectId : null}, ${selectKind != null and selectKind.name() == 'DRIVER' ? selectKey : null})}"></div>
    </section>

    <section class="n-subprogram-section" style="margin-top: 32px;">
        <div class="n-subprogram-section-header">
            <h2 class="n-subprogram-section-title">Utility</h2>
            <div class="n-subprogram-section-actions">
                <!-- S5-5 — 체크박스를 외부 + 등록 버튼의 왼편으로 swap. -->
                <!-- S5-4 — 토글 시 selectKind / selectId 등 다른 querystring 보존. -->
                <label class="n-checkbox">
                    <input type="checkbox"
                           th:checked="${includeDeleted}"
                           data-include-deleted-toggle>
                    삭제된 항목 포함
                </label>
                <a th:href="@{/management/subprogram/new(kind='UTILITY')}" class="n-btn n-btn-primary">+ 신규 유틸리티 등록</a>
            </div>
        </div>
        <div th:replace="~{fragments/management/subprogram/miller :: kindMiller(${utilityGroups}, 'utility', '유틸리티', 'utilityMiller', ${selectKind != null and selectKind.name() == 'UTILITY' ? selectId : null}, ${selectKind != null and selectKind.name() == 'UTILITY' ? selectKey : null})}"></div>
    </section>
</div>

<!-- MK2 — nudge modal (해시 충돌 시 사용자 3택 confirm 흐름) -->
<div th:replace="~{fragments/management/nudge-modal :: nudgeModal('subprogramNudge', '/management/subprogram/nudge')}"></div>

<!-- MK3-2 — softDelete reject modal fragment. delete form 이 별도 페이지에 있어도 본 list 에 미리 등록. -->
<div th:replace="~{fragments/management/delete-reject-modal :: deleteRejectModal('deleteReject')}"></div>

<!-- S5-2 — 4 종 자원 상태 변경 modal 묶음 + 공통 script 통합. -->
<div th:replace="~{fragments/management/confirm-modals :: all}"></div>

<!-- S5-4 — '삭제된 항목 포함' 토글 시 selectKind / selectId 등 querystring 보존. -->
<script th:src="@{/global/include-deleted-toggle.js}"></script>
<script th:src="@{/management/subprogram/subprogram-list.js}"></script>
<script th:src="@{/management/bios/bios-list.js}"></script>
<script th:src="@{/management/common/delete-reject-modal.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.DeleteRejectModal) {
            window.DeleteRejectModal.bind({
                deleteFormSelector: 'form.mk3-2-delete-form',
                modalPrefix: 'deleteReject'
            });
        }
    });
</script>
</body>
</html>
