<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A1. ISO 수정 폼 (OSMetadata 서브 리소스)
  ─────────────────────────────────────────────────────────
  Model:
    isoForm      : ISOUpdateRequest   @ModelAttribute (isoPath, description)
    osId, isoId  : Long               경로 파라미터
    contextLabel : String             화면 표시용 ("Rocky Linux 9.6" 등)
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('ISO 수정')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('os-metadata')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">ISO 수정</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/os(selectId=${osId})}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <div class="n-alert n-alert-muted" style="margin-bottom: 18px;">
                대상 OS : <strong th:text="${contextLabel}"></strong>
            </div>

            <form th:action="@{/management/os/{osId}/iso/{isoId}/edit(osId=${osId},isoId=${isoId})}"
                  th:object="${isoForm}"
                  method="post"
                  novalidate>

                <!-- S4 폼 배너 슬롯 -->
                <div class="n-form-banner n-alert n-alert-danger" role="alert" hidden></div>

                <div class="n-form-group">
                    <label class="n-label strong" for="isoPath">ISO 경로</label>
                    <div style="display: flex; gap: 8px;">
                        <input id="isoPath" type="text" th:field="*{isoPath}"
                               class="n-input" style="flex: 1;"
                               data-error-field="isoPath"
                               th:classappend="${#fields.hasErrors('isoPath')} ? 'is-invalid'"
                               placeholder="/mnt/iso/rocky9/DVD.iso"
                               th:data-browse-url="@{/management/browse}">
                        <button type="button" id="browseBtn" class="n-btn n-btn-ghost">탐색</button>
                    </div>
                    <div class="n-hint">
                        직접 타이핑하거나 <strong>탐색</strong> 버튼으로 디렉토리 / ISO 파일을 골라 채울 수 있습니다.
                    </div>
                    <div class="n-error" th:if="${#fields.hasErrors('isoPath')}"
                         th:errors="*{isoPath}"></div>

                    <!-- 경로 브라우저 패널 — iso-new 와 동일 fragment 재사용 -->
                    <div th:replace="~{fragments/management/directory-browse-panel :: browsePanel('browse', 'directory', '이 경로로 적용')}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"
                              data-error-field="description"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="n-error" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/os(selectId=${osId})}"
                       class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/management/common/path-browser.js}"></script>
<script th:src="@{/management/os/iso-edit.js}"></script>
</body>
</html>
