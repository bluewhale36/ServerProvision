<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A1. OS 이미지 신규 등록 폼
  ─────────────────────────────────────────────────────────
  Model:
    osImageForm : OSImageCreateRequest   @ModelAttribute (BindingResult 대상)
    osNameOptions : List<OSName>         MVP 대상 3종 (ROCKY_LINUX, CENTOS, UBUNTU)
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('신규 OS 이미지 등록')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('os-image')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">신규 OS 이미지 등록</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/os}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form th:action="@{/management/os}"
                  th:object="${osImageForm}"
                  method="post"
                  novalidate>

                <!-- OS 이름 : 신규 등록 시에만 선택 가능 (수정 화면에선 고정) -->
                <div class="n-form-group">
                    <label class="n-label strong" for="osName">OS 이름</label>
                    <select id="osName" th:field="*{osName}" class="n-select"
                            th:classappend="${#fields.hasErrors('osName')} ? 'is-invalid'">
                        <option value="">선택하세요</option>
                        <option th:each="name : ${osNameOptions}"
                                th:value="${name.name()}"
                                th:text="${name.displayName}"></option>
                    </select>
                    <div class="n-error" th:if="${#fields.hasErrors('osName')}"
                         th:errors="*{osName}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label strong" for="osVersion">OS 버전</label>
                    <input id="osVersion" type="text" th:field="*{osVersion}"
                           class="n-input"
                           th:classappend="${#fields.hasErrors('osVersion')} ? 'is-invalid'"
                           placeholder="예: 9.6">
                    <div class="n-hint">실제 ISO 경로 등은 등록 후 상세 화면에서 개별 ISO 로 추가합니다.</div>
                    <div class="n-error" th:if="${#fields.hasErrors('osVersion')}"
                         th:errors="*{osVersion}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"
                              placeholder="예: Rocky Linux 9 최신 마이너 릴리스"></textarea>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/os}" class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">등록</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
