<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A1. OS 메타데이터 수정 폼
  ─────────────────────────────────────────────────────────
  Model:
    osMetadataForm : OSMetadataUpdateRequest   @ModelAttribute (osVersion / repoPath / description)
    osMetadataId   : Long                    경로 파라미터
    osNameLabel : String                  화면 표시용 ("Rocky Linux" 등, 수정 불가)
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('OS 버전 수정')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('os-metadata')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">OS 버전 수정</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/os(selectId=${osMetadataId})}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form th:action="@{/management/os/{id}/edit(id=${osMetadataId})}"
                  th:object="${osMetadataForm}"
                  method="post"
                  novalidate>

                <!-- S4 폼 배너 슬롯 -->
                <div class="n-form-banner n-alert n-alert-danger" role="alert" hidden></div>

                <!-- OS 이름 : 수정 불가. 바꿀 땐 삭제 후 재등록 -->
                <div class="n-form-group">
                    <label class="n-label strong">OS 이름</label>
                    <input type="text" class="n-input" th:value="${osNameLabel}" readonly>
                    <div class="n-hint">OS 이름은 변경할 수 없습니다. 바꾸려면 삭제 후 재등록하세요.</div>
                </div>

                <div class="n-form-group">
                    <label class="n-label strong" for="osVersion">OS 버전</label>
                    <input id="osVersion" type="text" class="n-input" th:value="${osVersionLabel}" readonly>
                    <div class="n-hint">변경하려면 자원을 삭제 후 다시 생성해주세요.</div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"
                              data-error-field="description"></textarea>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/os(selectId=${osMetadataId})}"
                       class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
