<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  A1. OS 이미지 수정 폼
  ─────────────────────────────────────────────────────────
  Model:
    osImageForm : OSImageUpdateRequest   @ModelAttribute (osVersion / repoPath / description)
    osImageId   : Long                    경로 파라미터
    osNameLabel : String                  화면 표시용 ("Rocky Linux" 등, 수정 불가)
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('OS 이미지 수정')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('os-image')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">OS 이미지 수정</h1>
        <div class="n-header-actions">
            <a th:href="@{/management/os(selectId=${osImageId})}" class="n-back-link">← 목록으로</a>
        </div>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form th:action="@{/management/os/{id}/edit(id=${osImageId})}"
                  th:object="${osImageForm}"
                  method="post"
                  novalidate>

                <!-- OS 이름 : 수정 불가. 바꿀 땐 삭제 후 재등록 -->
                <div class="n-form-group">
                    <label class="n-label strong">OS 이름</label>
                    <input type="text" class="n-input" th:value="${osNameLabel}" readonly>
                    <div class="n-hint">OS 이름은 변경할 수 없습니다. 바꾸려면 삭제 후 재등록하세요.</div>
                </div>

                <div class="n-form-group">
                    <label class="n-label strong" for="osVersion">OS 버전</label>
                    <input id="osVersion" type="text" th:field="*{osVersion}"
                           class="n-input"
                           th:classappend="${#fields.hasErrors('osVersion')} ? 'is-invalid'"
                           placeholder="예: 9.6">
                    <div class="n-error" th:if="${#fields.hasErrors('osVersion')}"
                         th:errors="*{osVersion}"></div>
                </div>

                <div class="n-form-group">
                    <label class="n-label" for="description">설명 (선택)</label>
                    <textarea id="description" th:field="*{description}"
                              class="n-textarea" rows="3"></textarea>
                </div>

                <div class="n-form-actions">
                    <a th:href="@{/management/os(selectId=${osImageId})}"
                       class="n-btn n-btn-secondary">취소</a>
                    <button type="submit" class="n-btn n-btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
