<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('서버 상세 설정')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('dashboard', '', '')}"></nav>

<div class="n-page-sm">
    <div class="n-page-header">
        <h1 class="n-page-title">서버 상세 설정</h1>
        <a th:href="@{/pxe/v1/admin/dashboard}" class="n-back-link">대시보드로 돌아가기</a>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <form th:action="@{/pxe/v1/admin/nodes/{mac}/edit(mac=${node.macAddress})}"
                  th:object="${node}" method="post">

                <div class="n-section">하드웨어 식별 정보 (읽기 전용)</div>
                <div class="n-form-group">
                    <label class="n-label">MAC 주소</label>
                    <input type="text" class="n-input" th:field="*{macAddress}" readonly>
                </div>
                <div class="n-row">
                    <div>
                        <label class="n-label">제조사 (Vendor)</label>
                        <input type="text" class="n-input" th:field="*{vendor}" readonly>
                    </div>
                    <div>
                        <label class="n-label">보드 모델명 (Board Model)</label>
                        <input type="text" class="n-input" th:field="*{boardModel}" readonly>
                    </div>
                </div>

                <div class="n-section">IPMI 원격 제어 정보</div>
                <div class="n-form-group">
                    <label class="n-label strong">BMC / IPMI IP 주소</label>
                    <input type="text" class="n-input" th:field="*{ipmiIp}" placeholder="예: 10.10.1.50">
                </div>
                <div class="n-row">
                    <div>
                        <label class="n-label">관리자 계정명</label>
                        <input type="text" class="n-input" th:field="*{ipmiUser}" placeholder="예: admin">
                    </div>
                    <div>
                        <label class="n-label">관리자 비밀번호</label>
                        <input type="password" class="n-input" th:field="*{ipmiPassword}">
                    </div>
                </div>

                <div class="n-section">프로비저닝 네트워크 정보</div>
                <div class="n-row">
                    <div>
                        <label class="n-label strong">적용할 Hostname</label>
                        <input type="text" class="n-input" th:field="*{hostname}" placeholder="예: uniwide-db-01">
                    </div>
                    <div>
                        <label class="n-label strong">할당할 고정 IP</label>
                        <input type="text" class="n-input" th:field="*{assignedIp}" placeholder="예: 192.168.10.100">
                    </div>
                </div>

                <div class="n-section">작업 할당</div>
                <div class="n-form-group">
                    <label class="n-label blue">지시할 작업 (Target Job)</label>
                    <select class="n-select" th:field="*{targetJob}"
                            style="border-color: rgba(0,117,222,0.4);">
                        <option th:each="job : ${jobTypes}"
                                th:value="${job.name()}"
                                th:text="${job.description}"></option>
                    </select>
                    <p class="n-hint" style="color: var(--n-orange);">
                        ※ 작업을 할당하고 저장한 뒤 물리 서버를 재부팅하면 해당 작업이 즉시 수행됩니다.
                    </p>
                </div>

                <div class="n-form-actions">
                    <button type="submit" class="n-btn n-btn-primary">저장 및 적용하기</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
