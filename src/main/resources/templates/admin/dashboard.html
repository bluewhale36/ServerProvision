<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('베어메탈 프로비저닝 포털')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('dashboard', '/pxe/v1/admin/dashboard', '새로고침')}"></nav>

<div class="n-page">
    <div class="n-page-header">
        <h1 class="n-page-title">Server Provisioning Dashboard</h1>
    </div>

    <div class="n-card">
        <table class="n-table">
            <thead>
            <tr>
                <th>MAC 주소</th>
                <th>제조사</th>
                <th>모델명</th>
                <th>IPMI IP</th>
                <th>Hostname</th>
                <th>할당 IP</th>
                <th>지시된 작업</th>
                <th>현재 상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr class="n-table-empty" th:if="${#lists.isEmpty(nodes)}">
                <td colspan="9">등록된 서버가 없습니다. 서버 전원을 켜면 자동 등록됩니다.</td>
            </tr>

            <tr th:each="node : ${nodes}">
                <td class="n-table-mono" th:text="${node.macAddress}">00:11:22...</td>
                <td th:text="${node.vendor != null ? node.vendor : '-'}">GIGABYTE</td>
                <td th:text="${node.boardModel != null ? node.boardModel : '-'}">MS03-CE0</td>
                <td>
                    <span class="n-table-muted" th:if="${node.ipmiIp == null}">미입력</span>
                    <span th:if="${node.ipmiIp != null}" th:text="${node.ipmiIp}">192.168.x.x</span>
                </td>
                <td>
                    <span class="n-table-muted" th:if="${node.hostname == null}">자동생성</span>
                    <span th:if="${node.hostname != null}" th:text="${node.hostname}">db-01</span>
                </td>
                <td th:text="${node.assignedIp != null ? node.assignedIp : '-'}">10.0.0.1</td>
                <td>
                    <span class="n-badge"
                          th:classappend="${node.targetJob.name() == 'IDLE'} ? 'n-badge-gray' : 'n-badge-blue'"
                          th:text="${node.targetJob.description}">IDLE</span>
                </td>
                <td>
                    <span class="n-badge"
                          th:classappend="${node.status.name() == 'NEW' ? 'n-badge-teal' :
                                          (node.status.name() == 'PROVISIONING' ? 'n-badge-orange' :
                                          (node.status.name() == 'COMPLETED' ? 'n-badge-green' : 'n-badge-orange'))}"
                          th:text="${node.status.description}">NEW</span>
                </td>
                <td>
                    <div class="n-actions">
                        <a th:href="@{/pxe/v1/admin/nodes/{mac}/settings(mac=${node.macAddress})}"
                           class="n-btn n-btn-ghost n-btn-sm">설정</a>
                        <button class="n-btn n-btn-success n-btn-sm">작업시작</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
