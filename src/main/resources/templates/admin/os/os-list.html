<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유니와이드 - OS 메타데이터 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid py-4 px-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">💿 OS 메타데이터 관리</h2>
        <div>
            <a th:href="@{/pxe/v1/admin/dashboard}" class="btn btn-outline-secondary me-2">대시보드</a>
            <a th:href="@{/pxe/v1/admin/os/new}" class="btn btn-primary">신규 OS 등록</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>OS 명</th>
                    <th>버전</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(osList)}">
                    <td colspan="5" class="py-4 text-muted">등록된 OS 메타데이터가 없습니다.</td>
                </tr>
                <tr th:each="os : ${osList}">
                    <td th:text="${os.id}">1</td>
                    <td class="fw-bold" th:text="${os.osName.displayName}">Rocky Linux</td>
                    <td th:text="${os.osVersion}">8.9</td>
                    <td>
                        <span class="badge" th:classappend="${os.isEnabled} ? 'bg-success' : 'bg-danger'"
                              th:text="${os.isEnabled} ? '사용중' : '사용안함'"></span>
                    </td>
                    <td>
                        <a th:href="@{/pxe/v1/admin/os/{id}(id=${os.id})}" class="btn btn-sm btn-info text-white">상세</a>
                        <a th:href="@{/pxe/v1/admin/os/{id}/edit(id=${os.id})}" class="btn btn-sm btn-warning">수정</a>
                        <form th:action="@{/pxe/v1/admin/os/{id}/toggle(id=${os.id})}" method="post"
                              style="display:inline;">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${os.isEnabled} ? 'btn-outline-danger' : 'btn-outline-success'"
                                    th:text="${os.isEnabled} ? '비활성화' : '활성화'"></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
