<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OS 정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">✏️ OS 정보 수정</h2>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form id="osEditForm">
                <input type="hidden" id="targetId" th:value="${os.id}">
                <div class="mb-3">
                    <label class="form-label fw-bold">OS 이름</label>
                    <input type="text" class="form-control" id="osName" th:value="${os.osName}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">OS 버전</label>
                    <input type="text" class="form-control" id="osVersion" th:value="${os.osVersion}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ISO 마운트 경로</label>
                    <input type="text" class="form-control" id="isoMountPath" th:value="${os.isoMountPath}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Kickstart 템플릿 경로</label>
                    <input type="text" class="form-control" id="ksTemplatePath" th:value="${os.ksTemplatePath}">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="isEnabled" th:checked="${os.isEnabled}">
                    <label class="form-check-label fw-bold">활성화 여부</label>
                </div>
                <div class="d-flex justify-content-end">
                    <a th:href="@{/pxe/v1/admin/os/{id}(id=${os.id})}" class="btn btn-secondary me-2">취소</a>
                    <button type="button" class="btn btn-primary" onclick="submitEditJsonData()">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function submitEditJsonData() {
        const targetId = document.getElementById('targetId').value;
        const data = {
            targetId: targetId,
            osName: document.getElementById('osName').value,
            osVersion: document.getElementById('osVersion').value,
            isoMountPath: document.getElementById('isoMountPath').value,
            ksTemplatePath: document.getElementById('ksTemplatePath').value,
            isEnabled: document.getElementById('isEnabled').checked
        };

        fetch('/pxe/v1/admin/os/' + targetId + '/edit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(response => {
            if (response.redirected) window.location.href = response.url;
            else window.location.href = '/pxe/v1/admin/os';
        });
    }
</script>
</body>
</html>
