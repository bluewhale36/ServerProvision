<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OS 정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">✏️ OS 정보 수정</h2>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/pxe/v1/admin/os/{id}/edit(id=${id})}" th:object="${osDto}" method="post">
                <input type="hidden" th:field="*{targetId}">

                <div class="mb-3">
                    <label class="form-label fw-bold">OS 이름</label>
                    <select class="form-select" th:field="*{osName}" th:classappend="${#fields.hasErrors('osName')} ? 'is-invalid'">
                        <option th:each="os : ${osNames}" th:value="${os.name()}" th:text="${os.displayName}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('osName')}" th:errors="*{osName}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">OS 버전</label>
                    <input type="text" class="form-control" th:field="*{osVersion}"
                           th:classappend="${#fields.hasErrors('osVersion')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('osVersion')}"
                         th:errors="*{osVersion}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ISO 마운트 경로</label>
                    <input type="text" class="form-control" th:field="*{isoMountPath}"
                           th:classappend="${#fields.hasErrors('isoMountPath')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('isoMountPath')}"
                         th:errors="*{isoMountPath}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Kickstart 템플릿 경로</label>
                    <input type="text" class="form-control" th:field="*{ksTemplatePath}"
                           th:classappend="${#fields.hasErrors('ksTemplatePath')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('ksTemplatePath')}"
                         th:errors="*{ksTemplatePath}"></div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" th:field="*{isEnabled}">
                    <label class="form-check-label fw-bold">활성화 여부</label>
                </div>
                <div class="d-flex justify-content-end">
                    <a th:href="@{/pxe/v1/admin/os/{id}(id=${osDto.targetId})}" class="btn btn-secondary me-2">취소</a>
                    <button type="submit" class="btn btn-primary">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
