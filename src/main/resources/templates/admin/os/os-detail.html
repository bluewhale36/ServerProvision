<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OS 메타데이터 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">📄 OS 상세 정보</h2>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <table class="table table-bordered">
                <tbody>
                <tr>
                    <th class="bg-light w-25">ID</th>
                    <td th:text="${os.id}"></td>
                </tr>
                <tr>
                    <th class="bg-light">OS 이름</th>
                    <td th:text="${os.osName.displayName}"></td>
                </tr>
                <tr>
                    <th class="bg-light">OS 버전</th>
                    <td th:text="${os.osVersion}"></td>
                </tr>
                <tr>
                    <th class="bg-light">ISO 마운트 경로</th>
                    <td th:text="${os.isoMountPath}"></td>
                </tr>
                <tr>
                    <th class="bg-light">Kickstart 템플릿 경로</th>
                    <td th:text="${os.ksTemplatePath}"></td>
                </tr>
                <tr>
                    <th class="bg-light">사용 여부</th>
                    <td><span class="badge" th:classappend="${os.isEnabled} ? 'bg-success' : 'bg-danger'"
                              th:text="${os.isEnabled} ? '사용' : '미사용'"></span></td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-end mt-4">
                <a th:href="@{/pxe/v1/admin/os}" class="btn btn-secondary me-2">목록으로</a>
                <a th:href="@{/pxe/v1/admin/os/{id}/edit(id=${os.id})}" class="btn btn-primary">수정하기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
