<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('OS 메타데이터 상세')}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('os')}"></nav>

<div class="n-page-sm">
    <div class="n-page-header">
        <h1 class="n-page-title">OS 상세 정보</h1>
    </div>

    <div class="n-card">
        <div class="n-card-body">
            <table class="n-detail-table">
                <tbody>
                <tr>
                    <th>ID</th>
                    <td th:text="${os.id}"></td>
                </tr>
                <tr>
                    <th>OS 이름</th>
                    <td style="font-weight:600;" th:text="${os.osName.displayName}"></td>
                </tr>
                <tr>
                    <th>OS 버전</th>
                    <td th:text="${os.osVersion}"></td>
                </tr>
                <tr>
                    <th>ISO 마운트 경로</th>
                    <td><code th:text="${os.isoMountPath}"></code></td>
                </tr>
                <tr>
                    <th>Kickstart 템플릿 경로</th>
                    <td><code th:text="${os.ksTemplatePath}"></code></td>
                </tr>
                <tr>
                    <th>사용 여부</th>
                    <td>
                        <span class="n-badge"
                              th:classappend="${os.isEnabled} ? 'n-badge-green' : 'n-badge-orange'"
                              th:text="${os.isEnabled} ? '활성화' : '비활성화'"></span>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 환경 정보 자동 추출 결과 메시지 -->
            <div th:if="${extractSuccess}" class="n-alert n-alert-success" th:text="${extractSuccess}"></div>
            <div th:if="${extractError}"   class="n-alert n-alert-danger"  th:text="${extractError}"></div>

            <div class="n-card-footer">
                <!-- 환경 정보 자동 추출 -->
                <form th:action="@{/pxe/v1/admin/os/{id}/extract-packages(id=${os.id})}" method="post">
                    <button type="submit" class="n-btn n-btn-outline-info">환경 정보 자동 추출</button>
                </form>
                <div class="n-footer-right">
                    <a th:href="@{/pxe/v1/admin/os}" class="n-btn n-btn-secondary">목록으로</a>
                    <a th:href="@{/pxe/v1/admin/os/{id}/edit(id=${os.id})}" class="n-btn n-btn-primary">수정하기</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
