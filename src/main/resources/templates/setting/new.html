<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('신규 세팅 템플릿 생성')}"></th:block>
    <!-- 아코디언 동작에 Bootstrap JS 필요 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('setting', '', '')}"></nav>

<div class="n-page-md">
    <div class="n-page-header">
        <h1 class="n-page-title">신규 세팅 주문서(템플릿) 작성</h1>
    </div>

    <form id="settingForm" onsubmit="event.preventDefault(); submitSettingTemplate();">

        <!-- 주문서 식별 정보 -->
        <div class="card">
            <div class="card-header bg-dark">1. 주문서 식별 정보</div>
            <div class="card-body">
                <label class="form-label fw-bold">주문서 명칭 (필수)</label>
                <input type="text" class="form-control" id="settingName"
                       placeholder="예: Rocky Linux 9.6 표준 웹 서버 구성" required>
            </div>
        </div>

        <!-- 프로비저닝 프로세스 구성 -->
        <div class="card">
            <div class="card-header bg-primary">2. 프로비저닝 프로세스 구성</div>
            <div class="card-body">
                <div class="accordion" id="processAccordion">
                    <div class="accordion-item" th:each="step : ${settingProcessStepList}">
                        <h2 class="accordion-header" th:id="'heading_' + ${step.name()}">
                            <button class="accordion-button collapsed fw-bold" type="button"
                                    data-bs-toggle="collapse"
                                    th:data-bs-target="'#collapse_' + ${step.name()}"
                                    aria-expanded="false"
                                    th:text="${step.description}">
                            </button>
                        </h2>

                        <div th:id="'collapse_' + ${step.name()}" class="accordion-collapse collapse">
                            <div class="accordion-body" style="background: var(--n-bg);">

                                <!-- 단계 활성화 스위치 -->
                                <div class="form-check form-switch mb-3 pb-2"
                                     style="border-bottom: 1px solid rgba(0,0,0,0.08);">
                                    <input class="form-check-input step-enable-chk"
                                           type="checkbox" role="switch"
                                           th:id="'chk_' + ${step.name()}"
                                           th:value="${step.name()}"
                                           th:data-order="${step.order}"
                                           onchange="toggleStep(this)">
                                    <label class="form-check-label fw-bold"
                                           style="color: var(--n-blue);"
                                           th:for="'chk_' + ${step.name()}">
                                        이 단계 사용 (체크 시 입력 폼 및 필수 검증 활성화)
                                    </label>
                                </div>

                                <!-- 단계별 콘텐츠 영역 -->
                                <div th:id="'content_' + ${step.name()}"
                                     class="step-content-area"
                                     style="opacity: 0.4; pointer-events: none; transition: opacity 0.3s ease;">

                                    <!-- BASIC_UPDATE -->
                                    <th:block th:if="${step.name() == 'BASIC_UPDATE'}">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">메인보드 모델 선택</label>
                                            <select class="form-select w-50 target-req"
                                                    id="boardModelId"
                                                    onchange="checkIfBiosAndBmcAvailable(this.value)"
                                                    style="border-color: rgba(0,117,222,0.4);"
                                                    required>
                                                <option value="" selected>보드 모델을 선택하세요</option>
                                                <option th:each="view : ${boardViewList}"
                                                        th:value="${view.boardModel.id}"
                                                        th:text="|${view.boardModel.vendor} ${view.boardModel.description}|"></option>
                                            </select>
                                        </div>
                                        <div class="row g-3 mb-3">
                                            <div class="col-md-6">
                                                <label class="form-label fw-bold">업데이트할 BIOS 버전</label>
                                                <select class="form-select target-req"
                                                        style="border-color: rgba(0,117,222,0.4);"
                                                        id="boardBIOSId" disabled required>
                                                    <option value="" class="info-option" selected>보드 모델을 먼저 선택하세요</option>
                                                    <th:block th:each="view : ${boardViewList}">
                                                        <option class="unavailable"
                                                                th:data-compatible-board-model-id="${view.boardModel.id}"
                                                                th:each="bios : ${view.boardBIOSList}"
                                                                th:value="${bios.id}"
                                                                th:text="${bios.description}"></option>
                                                    </th:block>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label fw-bold">업데이트할 BMC 버전</label>
                                                <select class="form-select target-req"
                                                        style="border-color: rgba(0,117,222,0.4);"
                                                        id="boardBMCId" disabled required>
                                                    <option value="" class="info-option" selected>보드 모델을 먼저 선택하세요</option>
                                                    <th:block th:each="view : ${boardViewList}">
                                                        <option class="unavailable"
                                                                th:data-compatible-board-model-id="${view.boardModel.id}"
                                                                th:each="bmc : ${view.boardBMCList}"
                                                                th:value="${bmc.id}"
                                                                th:text="${bmc.description}"></option>
                                                    </th:block>
                                                </select>
                                            </div>
                                        </div>
                                    </th:block>

                                    <!-- BASIC_SETTING -->
                                    <th:block th:if="${step.name() == 'BASIC_SETTING'}">
                                        <div class="alert alert-info py-2 mb-0">
                                            BIOS 기본 설정 스크립트가 적용됩니다. 추가 입력 항목이 없습니다.
                                        </div>
                                    </th:block>

                                    <!-- OS_INSTALLATION -->
                                    <th:block th:if="${step.name() == 'OS_INSTALLATION'}">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">OS 종류 선택</label>
                                            <select class="form-select w-50 target-req"
                                                    style="border-color: rgba(0,117,222,0.4);"
                                                    id="osNameSelect"
                                                    onchange="onOsNameChange(this.value)" required>
                                                <option value="">OS 종류를 선택하세요</option>
                                                <option th:each="os : ${osInstallationViewList}"
                                                        th:value="${os.osNameKey}"
                                                        th:text="${os.osDisplayName}"></option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">버전 선택</label>
                                            <select class="form-select w-50 target-req"
                                                    style="border-color: rgba(0,117,222,0.4);"
                                                    id="osMetadataId"
                                                    onchange="onVersionChange(this.value)"
                                                    disabled required>
                                                <option value="" class="info-version-option">OS 종류를 먼저 선택하세요</option>
                                                <th:block th:each="os : ${osInstallationViewList}">
                                                    <option class="unavailable"
                                                            th:each="ver : ${os.versions}"
                                                            th:data-os-name="${os.osNameKey}"
                                                            th:value="${ver.id}"
                                                            th:text="${ver.version}" disabled></option>
                                                </th:block>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">설치 환경</label>
                                            <select class="form-select w-50 target-req"
                                                    style="border-color: rgba(0,117,222,0.4);"
                                                    id="environmentId"
                                                    onchange="onEnvironmentChange(this.value)"
                                                    disabled required>
                                                <option value="" class="info-env-option">버전을 먼저 선택하세요</option>
                                                <th:block th:each="os : ${osInstallationViewList}">
                                                    <th:block th:each="ver : ${os.versions}">
                                                        <option class="unavailable"
                                                                th:each="env : ${ver.environments}"
                                                                th:data-metadata-id="${ver.id}"
                                                                th:data-default="${env.isDefault}"
                                                                th:value="${env.id}"
                                                                th:text="${env.displayName}" disabled></option>
                                                    </th:block>
                                                </th:block>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">추가 패키지 그룹</label>
                                            <div id="packageGroupArea"
                                                 class="border rounded p-2"
                                                 style="min-height:40px; border-color: rgba(0,0,0,0.1) !important;">
                                                <span class="text-muted small" id="pkgGroupPlaceholder">환경을 선택하면 패키지 그룹이 표시됩니다.</span>
                                                <th:block th:each="os : ${osInstallationViewList}">
                                                    <th:block th:each="ver : ${os.versions}">
                                                        <th:block th:each="env : ${ver.environments}">
                                                            <div class="pkg-group-row unavailable form-check"
                                                                 th:each="pkg : ${env.packageGroups}"
                                                                 th:data-env-id="${env.id}">
                                                                <input class="form-check-input" type="checkbox"
                                                                       th:id="'pkg_' + ${pkg.id}"
                                                                       th:value="${pkg.id}"
                                                                       th:checked="${pkg.isDefault}"
                                                                       th:data-env-id="${env.id}">
                                                                <label class="form-check-label"
                                                                       th:for="'pkg_' + ${pkg.id}"
                                                                       th:text="${pkg.displayName}"></label>
                                                            </div>
                                                        </th:block>
                                                    </th:block>
                                                </th:block>
                                            </div>
                                        </div>
                                        <div class="row g-3 mb-3">
                                            <div class="col-md-4">
                                                <label class="form-label fw-bold">타임존</label>
                                                <input type="text" class="form-control target-req"
                                                       id="timezone" placeholder="예: Asia/Seoul" required>
                                            </div>
                                            <div class="col-auto d-flex align-items-end pb-1">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="isUTC">
                                                    <label class="form-check-label" for="isUTC">UTC 기준</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row g-3 mb-3">
                                            <div class="col-auto d-flex align-items-end pb-1">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="isKDumpEnabled">
                                                    <label class="form-check-label" for="isKDumpEnabled">KDump 활성화</label>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 파티션 구성 -->
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">파티션 구성</label>
                                            <div class="small text-muted mb-1">
                                                필수 마운트포인트: /, /boot, /boot/efi, swap
                                            </div>
                                            <table class="table table-sm table-bordered" id="partitionTable">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>마운트포인트</th>
                                                        <th>파일시스템</th>
                                                        <th>디스크명 (선택)</th>
                                                        <th>크기(MB)</th>
                                                        <th>Grow</th>
                                                        <th></th>
                                                    </tr>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                            <button type="button"
                                                    class="btn btn-outline-secondary btn-sm"
                                                    onclick="addPartitionRow()">+ 파티션 추가</button>
                                        </div>
                                        <!-- 사용자 설정 -->
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">사용자 설정</label>
                                            <div class="small text-muted mb-1">
                                                username이 "root"인 사용자를 반드시 포함해야 합니다.
                                            </div>
                                            <table class="table table-sm table-bordered" id="userTable">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>사용자명</th>
                                                        <th>비밀번호</th>
                                                        <th>sudo</th>
                                                        <th>비밀번호 암호화</th>
                                                        <th></th>
                                                    </tr>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                            <button type="button"
                                                    class="btn btn-outline-secondary btn-sm"
                                                    onclick="addUserRow()">+ 사용자 추가</button>
                                        </div>
                                    </th:block>

                                    <!-- OS_SETTING -->
                                    <th:block th:if="${step.name() == 'OS_SETTING'}">
                                        <div class="alert alert-secondary py-2 mb-0">
                                            OS 설치 후 진행될 사용자 정의 스크립트 구성 영역입니다.
                                        </div>
                                    </th:block>

                                </div><!-- /step-content-area -->
                            </div><!-- /accordion-body -->
                        </div><!-- /accordion-collapse -->
                    </div><!-- /accordion-item -->
                </div><!-- /accordion -->
            </div><!-- /card-body -->
        </div><!-- /card -->

        <div class="d-flex justify-content-end gap-2 mb-5">
            <a th:href="@{/pxe/v1/admin/dashboard}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary px-4 fw-bold">주문서 생성</button>
        </div>
    </form>
</div>

<style>
    /* 선택 불가 옵션 숨김 처리 */
    .unavailable { display: none !important; }
</style>

<script>
    function checkIfBiosAndBmcAvailable(selectedBoardModelId) {
        const biosSelect     = document.querySelector('select#boardBIOSId');
        const bmcSelect      = document.querySelector('select#boardBMCId');
        const biosInfoOption = document.querySelector('select#boardBIOSId > option.info-option');
        const bmcInfoOption  = document.querySelector('select#boardBMCId > option.info-option');

        if (selectedBoardModelId) {
            biosSelect.disabled = false;
            bmcSelect.disabled  = false;
            biosInfoOption.innerText = 'BIOS 버전을 선택하세요'; biosInfoOption.selected = true;
            bmcInfoOption.innerText  = 'BMC 버전을 선택하세요';  bmcInfoOption.selected  = true;

            document.querySelectorAll('select#boardBIOSId > option[data-compatible-board-model-id]').forEach(opt => {
                const match = opt.dataset.compatibleBoardModelId === selectedBoardModelId;
                opt.classList.toggle('unavailable', !match);
                opt.classList.toggle('available', match);
                opt.disabled = !match;
            });
            document.querySelectorAll('select#boardBMCId > option[data-compatible-board-model-id]').forEach(opt => {
                const match = opt.dataset.compatibleBoardModelId === selectedBoardModelId;
                opt.classList.toggle('unavailable', !match);
                opt.classList.toggle('available', match);
                opt.disabled = !match;
            });
        } else {
            biosSelect.disabled = true; bmcSelect.disabled = true;
            biosInfoOption.innerText = '보드 모델을 먼저 선택하세요'; biosInfoOption.selected = true;
            bmcInfoOption.innerText  = '보드 모델을 먼저 선택하세요'; bmcInfoOption.selected  = true;
        }
    }

    function toggleStep(changedCheckbox) {
        const currentOrder = parseInt(changedCheckbox.getAttribute('data-order'));
        const isChecked    = changedCheckbox.checked;

        document.querySelectorAll('.step-enable-chk').forEach(chk => {
            const order = parseInt(chk.getAttribute('data-order'));
            let shouldBeChecked = chk.checked;
            if (isChecked  && order <= currentOrder) shouldBeChecked = true;
            if (!isChecked && order >= currentOrder) shouldBeChecked = false;

            if (chk.checked !== shouldBeChecked || chk === changedCheckbox) {
                chk.checked = shouldBeChecked;
                const contentArea = document.getElementById('content_' + chk.value);
                const collapseEl  = document.getElementById('collapse_' + chk.value);

                if (contentArea && collapseEl) {
                    if (chk.checked) {
                        contentArea.style.opacity = '1';
                        contentArea.style.pointerEvents = 'auto';
                        contentArea.querySelectorAll('.target-req').forEach(el => el.required = true);
                        if (!collapseEl.classList.contains('show')) {
                            (bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, {toggle: false})).show();
                        }
                    } else {
                        contentArea.style.opacity = '0.4';
                        contentArea.style.pointerEvents = 'none';
                        contentArea.querySelectorAll('.target-req').forEach(el => {
                            el.required = false;
                            if (el.tagName === 'INPUT' && el.type !== 'checkbox') el.value = '';
                            if (el.tagName === 'SELECT') el.selectedIndex = 0;
                        });
                        if (collapseEl.classList.contains('show')) {
                            (bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, {toggle: false})).hide();
                        }
                    }
                }
            }
        });
    }

    // 1단계: OS 종류 선택 → 버전 셀렉트 동적 갱신
    function onOsNameChange(selectedOsName) {
        const verSelect  = document.getElementById('osMetadataId');
        const infoOption = verSelect.querySelector('.info-version-option');
        if (!selectedOsName) {
            verSelect.disabled = true; infoOption.innerText = 'OS 종류를 먼저 선택하세요'; infoOption.selected = true;
            document.querySelectorAll('#osMetadataId option[data-os-name]').forEach(o => { o.classList.add('unavailable'); o.classList.remove('available'); o.disabled = true; });
            onVersionChange(''); return;
        }
        verSelect.disabled = false; infoOption.innerText = '버전을 선택하세요'; infoOption.selected = true;
        document.querySelectorAll('#osMetadataId option[data-os-name]').forEach(o => {
            const match = o.dataset.osName === selectedOsName;
            o.classList.toggle('unavailable', !match); o.classList.toggle('available', match); o.disabled = !match;
        });
        onVersionChange('');
    }

    // 2단계: 버전 선택 → 환경 셀렉트 동적 갱신
    function onVersionChange(selectedMetadataId) {
        const envSelect  = document.getElementById('environmentId');
        const infoOption = envSelect.querySelector('.info-env-option');
        if (!selectedMetadataId) {
            envSelect.disabled = true; infoOption.innerText = '버전을 먼저 선택하세요'; infoOption.selected = true;
            document.querySelectorAll('#environmentId option[data-metadata-id]').forEach(o => { o.classList.add('unavailable'); o.classList.remove('available'); o.disabled = true; });
            onEnvironmentChange(''); return;
        }
        envSelect.disabled = false; infoOption.innerText = '환경을 선택하세요'; infoOption.selected = true;
        let defaultEnvId = null;
        document.querySelectorAll('#environmentId option[data-metadata-id]').forEach(o => {
            const match = o.dataset.metadataId === selectedMetadataId;
            o.classList.toggle('unavailable', !match); o.classList.toggle('available', match); o.disabled = !match;
            if (match && o.dataset.default === 'true' && !defaultEnvId) defaultEnvId = o.value;
        });
        if (defaultEnvId) { envSelect.value = defaultEnvId; onEnvironmentChange(defaultEnvId); }
        else onEnvironmentChange('');
    }

    // 3단계: 환경 선택 → 패키지 그룹 체크박스 동적 갱신
    function onEnvironmentChange(selectedEnvId) {
        document.querySelectorAll('.pkg-group-row').forEach(row => {
            const match = selectedEnvId && row.dataset.envId === selectedEnvId;
            row.classList.toggle('unavailable', !match); row.classList.toggle('available', match);
            const chk = row.querySelector('input[type=checkbox]');
            if (chk) chk.checked = match && chk.dataset.default === 'true';
        });
        document.getElementById('pkgGroupPlaceholder').style.display = selectedEnvId ? 'none' : '';
    }

    // 파티션 행 동적 추가
    function addPartitionRow() {
        const fsOptions = ['EXT3', 'EXT4', 'XFS', 'EFI', 'SWAP'];
        document.querySelector('#partitionTable tbody').insertAdjacentHTML('beforeend', `
            <tr>
                <td><input type="text" class="form-control form-control-sm mountPoint" placeholder="/boot"></td>
                <td><select class="form-select form-select-sm fileSystem">${fsOptions.map(v => `<option value="${v}">${v.toLowerCase()}</option>`).join('')}</select></td>
                <td><input type="text" class="form-control form-control-sm diskName" placeholder="sda"></td>
                <td><input type="number" class="form-control form-control-sm sizeInMB" min="1" placeholder="1024"></td>
                <td class="text-center align-middle"><input type="checkbox" class="form-check-input isGrow"></td>
                <td><button type="button" class="btn btn-outline-danger btn-sm" onclick="this.closest('tr').remove()">삭제</button></td>
            </tr>`);
    }

    // 사용자 행 동적 추가
    function addUserRow() {
        document.querySelector('#userTable tbody').insertAdjacentHTML('beforeend', `
            <tr>
                <td><input type="text" class="form-control form-control-sm username" placeholder="root"></td>
                <td><input type="password" class="form-control form-control-sm password"></td>
                <td class="text-center align-middle"><input type="checkbox" class="form-check-input isSudoer"></td>
                <td class="text-center align-middle"><input type="checkbox" class="form-check-input isPasswordEncrypted"></td>
                <td><button type="button" class="btn btn-outline-danger btn-sm" onclick="this.closest('tr').remove()">삭제</button></td>
            </tr>`);
    }

    /**
     * 폼 유효성 검사 통과 후 최종 JSON 조립 및 전송 로직
     */
    function submitSettingTemplate() {
        const processList = [];

        document.querySelectorAll('.step-enable-chk:checked').forEach(chk => {
            const stepName = chk.value;
            if (stepName === 'BASIC_UPDATE') {
                processList.push({
                    type: "BASIC_UPDATES",
                    boardModelId: parseInt(document.querySelector('#boardModelId').value),
                    boardBIOSId:  parseInt(document.querySelector('#boardBIOSId').value),
                    boardBMCId:   parseInt(document.querySelector('#boardBMCId').value)
                });
            } else if (stepName === 'BASIC_SETTING') {
                processList.push({type: "BASIC_SETTING"});
            } else if (stepName === 'OS_INSTALLATION') {
                const partitions = Array.from(document.querySelectorAll('#partitionTable tbody tr')).map(row => ({
                    mountPoint: row.querySelector('.mountPoint').value,
                    fileSystem: row.querySelector('.fileSystem').value,
                    diskName:   row.querySelector('.diskName').value || null,
                    sizeInMB:   parseInt(row.querySelector('.sizeInMB').value) || 1,
                    isGrow:     row.querySelector('.isGrow').checked
                }));
                const users = Array.from(document.querySelectorAll('#userTable tbody tr')).map(row => ({
                    username:            row.querySelector('.username').value,
                    password:            row.querySelector('.password').value,
                    isSudoer:            row.querySelector('.isSudoer').checked,
                    isPasswordEncrypted: row.querySelector('.isPasswordEncrypted').checked
                }));
                const pkgGroupIds = Array.from(
                    document.querySelectorAll('.pkg-group-row:not(.unavailable) input[type=checkbox]:checked')
                ).map(cb => parseInt(cb.value));
                processList.push({
                    type:            "OS_INSTALLATION",
                    osMetadataId:    parseInt(document.getElementById('osMetadataId').value),
                    isKDumpEnabled:  document.getElementById('isKDumpEnabled').checked,
                    timezone:        { timezone: document.getElementById('timezone').value, isUTC: document.getElementById('isUTC').checked },
                    environmentId:   parseInt(document.getElementById('environmentId').value),
                    packageGroupIds: pkgGroupIds,
                    partitions,
                    users
                });
            } else if (stepName === 'OS_SETTING') {
                processList.push({type: "OS_SETTING"});
            }
        });

        if (processList.length === 0) {
            alert("최소 하나 이상의 프로비저닝 단계를 사용(체크)해야 합니다.");
            return;
        }

        const payload = { name: document.getElementById('settingName').value, processList };

        fetch('/pxe/v1/setting/api/new', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) return response.json().then(err => { throw new Error(err.message || "서버 응답 오류 (" + response.status + ")"); });
            return response;
        })
        .then(() => { alert("주문서 생성이 완료되었습니다."); })
        .catch(error => { console.error("통신 실패:", error); alert("요청 처리에 실패했습니다: " + error.message); });
    }
</script>
</body>
</html>
