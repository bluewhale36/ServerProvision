<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>유니와이드 - 신규 세팅 템플릿 생성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">📋 신규 세팅 주문서(템플릿) 작성</h2>

    <form id="settingForm">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white fw-bold">1. 주문서 식별 정보</div>
            <div class="card-body">
                <label class="form-label fw-bold">주문서 명칭 (필수)</label>
                <input type="text" class="form-control border-dark" id="settingName" placeholder="예: Rocky Linux 8 표준 웹 서버 구성">
                <div class="form-text">추후 서버 목록에서 이 이름으로 주문서를 찾아 할당하게 됩니다.</div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white fw-bold">2. 프로비저닝 프로세스 추가</div>
            <div class="card-body">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="chkBasicUpd">
                    <label class="form-check-label fw-bold" for="chkBasicUpd">기본 패키지 업데이트 (Basic Updates)</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="chkBasicSet">
                    <label class="form-check-label fw-bold" for="chkBasicSet">기본 환경 설정 (Basic Setting)</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="chkOsInst" onchange="document.getElementById('osSelectDiv').style.display = this.checked ? 'block' : 'none';">
                    <label class="form-check-label fw-bold text-primary" for="chkOsInst">OS 설치 (OS Installation)</label>

                    <div class="mt-2 ms-3" id="osSelectDiv" style="display: none;">
                        <select class="form-select border-primary w-75" id="osMetadataId">
                            <option value="">설치할 OS 메타데이터를 선택하세요</option>
                            <option th:each="os : ${osList}" th:value="${os.id}" th:text="|${os.osName.displayName} ${os.osVersion}|"></option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end mb-5">
            <a th:href="@{/pxe/v1/admin/dashboard}" class="btn btn-secondary me-2">취소</a>
            <button type="button" class="btn btn-primary px-4 fw-bold" onclick="submitSettingTemplate()">주문서 생성</button>
        </div>
    </form>
</div>

</body>
</html>
