<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMC 비밀번호 변경 — Redfish 적용 계획</title>
    <!-- v 쿼리 = 캐시버스터 (스타일 변경 시 증가) -->
    <link rel="stylesheet" th:href="@{/provisioning/bios-setup.css(v=2)}">
</head>
<body class="bios-body bios-select-body">
<main class="bios-select bmc-page">
    <h1 class="bios-select-title">BMC 비밀번호 변경</h1>
    <p class="bios-select-sub">
        입력 후 전송하면 실제 BMC 에 보내야 할 Redfish 요청(경로 · method · body)을 표시합니다.
        서버는 실제 호출 없이 로그만 남깁니다 (비밀번호는 로그에서 마스킹).
    </p>

    <form id="bmcForm" class="bmc-form" th:attr="data-plan-url=@{/provisioning/bmc-password/plan}">
        <label class="bmc-field">
            <span class="bmc-label">BMC IP <em class="bmc-opt">(선택 — 표시용)</em></span>
            <input id="bmcIp" class="bmc-input" type="text" placeholder="192.168.0.100" autocomplete="off">
        </label>
        <label class="bmc-field">
            <span class="bmc-label">계정 ID</span>
            <input id="bmcAccountId" class="bmc-input" type="text" inputmode="numeric" placeholder="2" required
                   autocomplete="off">
            <span class="bmc-hint">GET /redfish/v1/AccountService/Accounts 의 Members 로 확인 (admin 은 보통 2)</span>
        </label>
        <label class="bmc-field">
            <span class="bmc-label">계정명 <em class="bmc-opt">(선택 — 참고 표시용)</em></span>
            <input id="bmcUserName" class="bmc-input" type="text" placeholder="admin" autocomplete="off">
        </label>
        <label class="bmc-field">
            <span class="bmc-label">새 비밀번호</span>
            <input id="bmcPassword" class="bmc-input" type="password" required autocomplete="new-password">
        </label>
        <label class="bmc-field">
            <span class="bmc-label">새 비밀번호 확인</span>
            <input id="bmcPasswordConfirm" class="bmc-input" type="password" required autocomplete="new-password">
        </label>

        <p id="bmcFormError" class="bmc-error" hidden></p>

        <div class="bmc-actions">
            <a class="bios-btn" th:href="@{/provisioning/bios-setup}">‹ BIOS 셋업으로</a>
            <button type="submit" class="bios-btn bios-btn--primary">전송</button>
        </div>
    </form>

    <!-- 적용 계획 결과 -->
    <section id="bmcResult" class="bmc-result" hidden>
        <h2 class="bmc-result-title">Redfish 적용 계획</h2>
        <p class="bmc-result-sub">아래 요청을 BMC 에 그대로 보내면 됩니다 (서버 로그에도 마스킹 기록됨).</p>
        <pre class="bios-json" id="bmcRequestLine"></pre>
        <p class="bmc-result-sub">Request Body:</p>
        <pre class="bios-json" id="bmcRequestBody"></pre>
        <p class="bmc-note" id="bmcNote"></p>
    </section>
</main>

<script th:src="@{/provisioning/bmc-password.js}"></script>
</body>
</html>
