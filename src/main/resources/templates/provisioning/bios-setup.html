<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="'BIOS Setup — ' + ${boardKey}">BIOS Setup</title>
	<!--
		BIOS 셋업 화면은 실제 펌웨어 화면 재현이 목적이라 관리자 포털 navbar/공통 CSS 를 일부러 포함하지 않는다
		(Bootstrap/Notion 테마가 BIOS 룩을 깨뜨림). 전용 bios-setup.css 만 로드한다 — 이 파일은 본 페이지에서만 링크된다.
	-->
	<!-- v 쿼리 = 캐시버스터 (스타일 변경 시 증가) -->
	<link rel="stylesheet" th:href="@{/provisioning/bios-setup.css(v=2)}">
</head>
<body class="bios-body">

<form class="bios-screen" id="biosForm"
      th:attr="data-save-url=@{/provisioning/bios-setup/{key}/save(key=${boardKey})}">

	<!-- ① 헤더 + 탭바 -->
	<header class="bios-header">
		<div class="bios-brand">
			<a class="bios-brand-back" th:href="@{/provisioning/bios-setup}" title="보드 선택으로">‹ 보드 선택</a>
			<span class="bios-brand-name">Aptio Setup Utility</span>
			<span class="bios-brand-sub">GIGABYTE · <span th:text="${boardKey}">MS74-HB0</span></span>
		</div>
		<nav class="bios-tabs">
			<button type="button" class="bios-tab"
			        th:each="tab : ${bios.menuBar}"
			        th:attr="data-menu=${tab.pageId}"
			        th:text="${tab.title}">Advanced</button>
		</nav>
	</header>

	<!-- ② 브레드크럼 -->
	<div class="bios-breadcrumb" id="biosBreadcrumb"></div>

	<!-- ③ 본문: 항목 영역 + 도움말 -->
	<div class="bios-main">
		<section class="bios-items" id="biosItems">
			<div class="bios-page" th:each="page : ${bios.pages}"
			     th:attr="data-page=${page.pageId}, data-parent=${page.parentId}"
			     th:classappend="${(!#lists.isEmpty(bios.menuBar) and page.pageId == bios.menuBar[0].pageId) ? 'is-active' : ''}">
				<h2 class="bios-page-title" th:text="${page.title}">Page Title</h2>
				<ul class="bios-rows">
					<th:block th:each="row : ${page.rows}" th:switch="${row.kind()}">

						<!-- 위젯 행 -->
						<li th:case="'widget'" class="bios-row bios-row--widget"
						    th:classappend="${row.indentDepth > 0 ? 'is-indent-' + row.indentDepth : ''}"
						    th:attr="data-row=${row.attributeName}, data-help=${row.helpText}, data-reset=${row.resetRequired}">
							<span class="bios-label" th:text="${row.displayName}">Label</span>
							<span class="bios-leader"></span>
							<span class="bios-value" th:switch="${row.widgetKind}">
								<select th:case="'select'" class="bios-input bios-select"
								        th:disabled="${row.readOnly}"
								        th:attr="data-attr=${row.attributeName}, data-type='select', data-default=${row.defaultValue}, data-readonly=${row.readOnly},
								                 data-enable-when=${row.conditional != null ? row.conditional.controllerAttribute : null},
								                 data-enable-value=${row.conditional != null ? row.conditional.enableValue : null},
								                 data-forced=${row.conditional != null ? row.conditional.forcedValue : null}">
									<option th:each="opt : ${row.options}"
									        th:value="${opt.valueName}"
									        th:text="${opt.valueDisplayName}"
									        th:selected="${opt.valueName == row.defaultValue}">Option</option>
								</select>
								<input th:case="'number'" type="number" class="bios-input bios-int"
								       th:disabled="${row.readOnly}"
								       th:value="${row.defaultValue}"
								       th:attr="data-attr=${row.attributeName}, data-type='number', data-default=${row.defaultValue}, data-readonly=${row.readOnly}, min=${row.lower}, max=${row.upper}, step=${row.step},
								                data-enable-when=${row.conditional != null ? row.conditional.controllerAttribute : null},
								                data-enable-value=${row.conditional != null ? row.conditional.enableValue : null},
								                data-forced=${row.conditional != null ? row.conditional.forcedValue : null}">
								<input th:case="'password'" type="password" class="bios-input bios-pass"
								       th:disabled="${row.readOnly}"
								       th:attr="data-attr=${row.attributeName}, data-type='password', data-default='', data-readonly=${row.readOnly}, maxlength=${row.maxLength}"
								       value="" placeholder="••••••">
								<select th:case="'boolean'" class="bios-input bios-select"
								        th:disabled="${row.readOnly}"
								        th:attr="data-attr=${row.attributeName}, data-type='boolean', data-default=${row.defaultValue}, data-readonly=${row.readOnly},
								                 data-enable-when=${row.conditional != null ? row.conditional.controllerAttribute : null},
								                 data-enable-value=${row.conditional != null ? row.conditional.enableValue : null},
								                 data-forced=${row.conditional != null ? row.conditional.forcedValue : null}">
									<option value="true" th:selected="${row.defaultValue == 'true'}">Enabled</option>
									<option value="false" th:selected="${row.defaultValue == 'false'}">Disabled</option>
								</select>
							</span>
							<span class="bios-reset" th:if="${row.resetRequired}" title="변경 시 재부팅 필요">↻</span>
						</li>

						<!-- submenu 행 -->
						<li th:case="'submenu'" class="bios-row bios-row--submenu"
						    th:classappend="${row.navigable ? '' : 'is-disabled'}"
						    th:attr="data-help=${row.helpText}, data-goto=${row.navigable ? row.destPageId : null}">
							<span class="bios-label" th:text="${row.label}">Submenu</span>
							<span class="bios-leader"></span>
							<span class="bios-value bios-arrow" th:text="${row.navigable ? '▶' : ''}"></span>
						</li>

					</th:block>
				</ul>
				<p class="bios-empty" th:if="${#lists.isEmpty(page.rows)}">— 이 페이지에 표시할 항목이 없습니다 —</p>
			</div>
		</section>

		<!-- 도움말 패널 -->
		<aside class="bios-help">
			<h3 class="bios-help-title">Item Help</h3>
			<p class="bios-help-text" id="biosHelpText">항목에 포커스하거나 마우스를 올리면 설명이 표시됩니다.</p>
			<p class="bios-help-meta" id="biosHelpMeta"></p>
		</aside>
	</div>

	<!-- ④ 푸터: 키 레전드 + 액션 -->
	<footer class="bios-footer">
		<ul class="bios-keys">
			<li><kbd>↑↓</kbd> Select Item</li>
			<li><kbd>Enter</kbd> Select</li>
			<li><kbd>+/-</kbd> Change Opt</li>
			<li><kbd>F3</kbd> Defaults</li>
			<li><kbd>F4</kbd> Save</li>
			<li><kbd>Esc</kbd> Back</li>
		</ul>
		<div class="bios-actions">
			<button type="button" class="bios-btn" id="biosResetDefaults">F3 기본값 복원</button>
			<button type="submit" class="bios-btn bios-btn--primary" id="biosSave">F4 저장</button>
		</div>
	</footer>

	<!-- 의존성 데이터(클라이언트 동적 Hidden/GrayOut 평가용) -->
	<div id="biosDepData" hidden>
		<span class="bios-dep" th:each="d : ${bios.dependencies}"
		      th:attr="data-from=${d.fromAttribute}, data-fromval=${d.fromValue}, data-to=${d.toAttribute}, data-prop=${d.toProperty}"></span>
	</div>
</form>

<!-- 저장 결과(Redfish 프리뷰) 모달 -->
<div class="bios-modal" id="biosModal" hidden>
	<div class="bios-modal-box">
		<div class="bios-modal-head">
			<h3 id="biosModalTitle">저장 결과</h3>
			<button type="button" class="bios-modal-close" id="biosModalClose" aria-label="닫기">✕</button>
		</div>
		<div class="bios-modal-body" id="biosModalBody"></div>
	</div>
</div>

<script th:src="@{/provisioning/bios-setup.js}"></script>
</body>
</html>
