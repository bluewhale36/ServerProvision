<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  BIOS 세팅 템플릿 작성 — 보드 선택 랜딩 (U2-2-1, 구 bios-board-select.html 이관)
  ─────────────────────────────────────────────────────────
  Model:
    boards : List<BiosSettingBoardCardResponse> — management BoardModel 실데이터 (FK 전환)
               · boardModelId     : Long   (편집기 진입 URL 의 path variable)
               · modelName        : String (카드 주 표기)
               · vendor           : String (카드 보조 표기)
               · catalogAvailable : boolean — BIOS 카탈로그(registry/SetupData) 등록 여부

  catalogAvailable=true  → 카드 클릭 시 /provisioning/bios-setting/new/{boardModelId} 작성 편집기로 진입.
  catalogAvailable=false → 카드 disabled + tooltip (UI 1차 차단) — direct GET 은 로더의
                           카탈로그 존재 판정(404) 안전망이 받는다 (같은 판정의 단일 SSOT).
  본문은 BIOS 룩(bios-setting.css)을 유지하되, 포털 흐름에 편입되었으므로 navbar 를 포함한다.
-->
<head>
	<th:block th:replace="~{fragments/layout :: commonHead('BIOS 세팅 템플릿 작성 — 보드 선택')}"></th:block>
	<!-- v 쿼리 = 캐시버스터 (스타일 변경 시 증가) -->
	<link rel="stylesheet" th:href="@{/provisioning/bios-setting.css(v=2)}">
</head>
<body class="bios-body bios-select-body">
<nav th:replace="~{fragments/layout :: navbar('bios-setting')}"></nav>

<main class="bios-select">
	<h1 class="bios-select-title">BIOS 세팅 템플릿 작성</h1>
	<p class="bios-select-sub">management 에 등록된 메인보드 모델 중 템플릿을 작성할 보드를 선택하세요.</p>

	<div class="bios-board-grid">
		<th:block th:each="board : ${boards}">
			<!-- 카탈로그 보유 — 편집기 진입 -->
			<a th:if="${board.catalogAvailable}" class="bios-board-card"
			   th:href="@{/provisioning/bios-setting/new/{id}(id=${board.boardModelId})}">
				<span class="bios-board-key" th:text="${board.modelName}">MS74-HB0</span>
				<span class="bios-brand-sub" th:text="${board.vendor}">GIGABYTE</span>
				<span class="bios-board-go">템플릿 작성 ▶</span>
			</a>
			<!-- 카탈로그 미보유 — disabled 카드 + tooltip (UI 1차 차단).
			     n-btn-disabled 가 pointer-events 를 제거하므로 hover tooltip 은 wrapper 가 발동한다
			     (detail 페이지 '수정' 버튼과 동일한 S5-3-2 자산 사용법). -->
			<span th:unless="${board.catalogAvailable}" class="n-btn-tooltip-wrap"
			      data-tooltip="BIOS 카탈로그(registry/SetupData) 미보유 보드입니다">
				<span class="bios-board-card n-btn-disabled" aria-disabled="true">
					<span class="bios-board-key" th:text="${board.modelName}">MS74-HB0</span>
					<span class="bios-brand-sub" th:text="${board.vendor}">GIGABYTE</span>
					<span class="bios-board-go">카탈로그 미보유</span>
				</span>
			</span>
		</th:block>
	</div>

	<p class="bios-select-empty" th:if="${#lists.isEmpty(boards)}">
		등록된 메인보드 모델이 없습니다. management 의 메인보드 관리에서 모델을 먼저 등록하세요.
	</p>

	<p class="bios-select-links">
		<a th:href="@{/provisioning/bmc-password}">BMC 비밀번호 변경 ›</a>
	</p>
</main>
</body>
</html>
