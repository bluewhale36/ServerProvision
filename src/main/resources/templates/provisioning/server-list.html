<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  등록된 게스트 서버 목록 페이지
  ─────────────────────────────────────────────────────────
  Model:
    servers : List<GuestServerSummaryResponse>  (execution.dto.response)
                · id              : UUID
                · name            : String (nullable — 운영자 미지정)
                · systemUuid      : UUID
                · vendor          : Vendor (nullable, boardModel 에서 도출 — U1 §D2)
                · boardModelName  : String (nullable)
                · status          : GuestServerStatus (도출 — progress + 회수, U1 §D4)
                · primaryIp       : IpAddressVO (nullable)
                · createdAt       : LocalDateTime

  행 클릭 시 /provisioning/server/{id} 상세로 이동.
-->
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('게스트 서버')}"></th:block>
    <link rel="stylesheet" th:href="@{/provisioning/server.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('server')}"></nav>

<div class="n-page">
    <div class="n-page-header">
        <h1 class="n-page-title">게스트 서버</h1>
        <div class="n-header-actions">
            <span class="n-hint">iPXE 부팅으로 등록된 물리 서버 목록입니다. 행을 클릭하면 상세 정보를 볼 수 있습니다.</span>
        </div>
    </div>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(servers)}" class="n-card">
        <div class="n-empty">
            <div class="n-empty-title">등록된 게스트 서버가 없습니다.</div>
            <div class="n-empty-desc">서버가 PXE 부팅으로 <code>/api/pxe/v1/boot</code> 에 진입하면 이곳에 표시됩니다.</div>
        </div>
    </div>

    <!-- 서버 목록 -->
    <div th:unless="${#lists.isEmpty(servers)}" class="n-card">
    <table class="n-table" id="serverTable">
        <thead>
        <tr>
            <th>이름</th>
            <th>SMBIOS UUID</th>
            <th>제조사</th>
            <th>보드 모델</th>
            <th>운영 상태</th>
            <th>접촉</th>
            <th>호스트 IP</th>
            <th>등록 시각</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="server : ${servers}"
            class="n-row-clickable"
            th:data-href="@{/provisioning/server/{id}(id=${server.id})}">
            <td>
                <a class="n-row-link"
                   th:href="@{/provisioning/server/{id}(id=${server.id})}"
                   th:text="${server.name != null} ? ${server.name} : '(이름 미지정)'">srv-01</a>
            </td>
            <td><code class="n-mono" th:text="${server.systemUuid}">uuid</code></td>
            <td th:text="${server.vendor != null} ? ${server.vendor.displayName} : '—'">Gigabyte</td>
            <td th:text="${server.boardModelName != null} ? ${server.boardModelName} : '—'">MS03-CE0</td>
            <td th:switch="${server.status != null} ? ${server.status.name()} : 'NONE'">
                <span th:case="'REGISTERED'"     class="n-badge n-badge-blue"  th:text="${server.status.description}">등록됨</span>
                <span th:case="'PROVISIONING'"   class="n-badge n-badge-green" th:text="${server.status.description}">프로비저닝 중</span>
                <span th:case="'PROVISIONED'"    class="n-badge n-badge-teal"  th:text="${server.status.description}">완료</span>
                <span th:case="'FAILED'"         class="n-badge n-badge-red"   th:text="${server.status.description}">실패</span>
                <span th:case="'DECOMMISSIONED'" class="n-badge n-badge-gray"  th:text="${server.status.description}">회수됨</span>
                <span th:case="*" class="n-muted">—</span>
            </td>
            <td>
                <!-- E1-2 (DEC-32) — 게스트 접촉 관찰 -->
                <span th:if="${server.contactActive}" class="n-badge n-badge-teal">접촉 중</span>
                <span th:if="${!server.contactActive and server.lastSeenAt != null}" class="n-badge n-badge-gray"
                      th:title="${#temporals.format(server.lastSeenAt, 'yyyy-MM-dd HH:mm:ss')}">무접촉</span>
                <span th:if="${server.lastSeenAt == null}" class="n-muted">—</span>
            </td>
            <td><code class="n-mono" th:text="${server.primaryIp != null} ? ${server.primaryIp.value} : '—'">192.168.1.1</code></td>
            <td>
                <span th:if="${server.createdAt != null}"
                      th:text="${#temporals.format(server.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-06-26 12:00:00</span>
                <span th:unless="${server.createdAt != null}" class="n-muted">—</span>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</div>

<!-- 행 전체 클릭 → 상세 이동. 셀 내부 <a> 는 자체 동작하므로 중복 내비게이션 방지. -->
<script th:src="@{/provisioning/server-list.js}"></script>

</body>
</html>
