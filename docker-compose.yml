# 로컬 개발용 MariaDB. 클론 후 이 한 파일로 DB 를 띄우고 스키마를 자동 적재한다.
#
#   docker compose up -d
#
# ddl/schema.sql 이 최초 기동 시 1회 초기화 스크립트로 실행되어 전체 테이블을 만든다.
# 그 뒤 앱을 ddl-auto=validate 로 실행하면 이 스키마를 검증만 한다(README 참고).
# 앱 자체는 gradle 로 실행하므로 이 compose 에 포함하지 않는다.

services:
  db:
    image: mariadb:11.4
    container_name: serverprovision-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: server_provision
      MARIADB_USER: provision
      MARIADB_PASSWORD: provision
    ports:
      - "3306:3306"
    volumes:
      # 최초 기동 시 스키마 자동 적재 (데이터 볼륨이 비어 있을 때만 실행된다).
      - ./ddl/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - serverprovision-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  serverprovision-db-data:
